<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 900 280" role="img" aria-label="Contributors welcome — five coconut friends (the CocoIndex mascot, in five different colours) celebrating contributions: a wave, a held heart, a pull-request tag, a wrench, and a high-five. Sparkles and hearts float around.">
  <title>Contributors welcome</title>
  <desc>Five variations of the CocoIndex coconut mascot, each holding or doing something that represents a way to contribute.</desc>
  <defs>
    <style>
      .float { animation: f 3.4s ease-in-out infinite; transform-origin: center; transform-box: fill-box; }
      .d2 { animation-delay: 0.4s; }
      .d3 { animation-delay: 0.8s; }
      .d4 { animation-delay: 1.2s; }
      .d5 { animation-delay: 1.6s; }
      @keyframes f { 0%,100% { transform: translateY(0); } 50% { transform: translateY(-9px); } }

      .wave { animation: w 2.2s ease-in-out infinite; transform-origin: center; transform-box: fill-box; }
      @keyframes w { 0%,100% { transform: rotate(-14deg); } 50% { transform: rotate(18deg); } }

      .heartbeat { animation: hb 1.6s ease-in-out infinite; transform-origin: center; transform-box: fill-box; }
      @keyframes hb { 0%,100% { transform: scale(1); } 50% { transform: scale(1.15); } }

      .sparkle { animation: sp 2.2s ease-in-out infinite; transform-origin: center; transform-box: fill-box; }
      @keyframes sp { 0%,100% { opacity: 0; transform: scale(0.5); } 50% { opacity: 1; transform: scale(1); } }
      .sp2 { animation-delay: 0.4s } .sp3 { animation-delay: 0.8s }
      .sp4 { animation-delay: 1.2s } .sp5 { animation-delay: 1.6s }

      .pulse { animation: p 1.8s ease-in-out infinite; }
      @keyframes p { 0%,100% { opacity: 0.75 } 50% { opacity: 1 } }
    </style>

    <!-- === CANONICAL COCO (faithful to assets/cocoindex.svg, scaled to ~80px radius) === -->
    <!-- base at local 0,0 with radius ~60 -->
    <g id="coco-base">
      <!-- palm stem -->
      <path d="M4 -78 Q6 -74 5 -68 Q3 -72 0 -74 Q2 -80 4 -78 Z" fill="#532638"/>
      <!-- green palm leaves (big splash behind head) -->
      <path d="M14 -84 C 2 -72 -2 -60 -10 -48 C 24 -56 40 -48 52 -60 C 64 -72 72 -88 72 -94 C 60 -86 42 -88 22 -86 C 18 -86 14 -84 14 -84 Z" fill="#27E62B" fill-opacity="0.82"/>
      <!-- cream highlight on leaf -->
      <ellipse cx="44" cy="-78" rx="4.5" ry="4" fill="#FCF3D8"/>
      <!-- coral body -->
      <circle cx="0" cy="0" r="60" fill="#BE5133"/>
      <!-- cream inner plate -->
      <ellipse cx="0" cy="4" rx="52" ry="46" fill="#FCF3D8"/>
      <!-- peach highlight -->
      <ellipse cx="0" cy="4" rx="44" ry="36" fill="#E59A63"/>
      <!-- maroon freckle-marks above eyes -->
      <ellipse cx="-22" cy="-14" rx="6" ry="2.4" fill="#401D30" transform="rotate(-6 -22 -14)"/>
      <ellipse cx="22" cy="-14" rx="6" ry="2.4" fill="#401D30" transform="rotate(6 22 -14)"/>
      <!-- pink cheeks -->
      <ellipse cx="-28" cy="16" rx="7" ry="4" fill="#FB6A76"/>
      <ellipse cx="28"  cy="16" rx="7" ry="4" fill="#FB6A76"/>
      <!-- big eyes -->
      <circle cx="-18" cy="-2" r="10" fill="#401D30"/>
      <circle cx="18"  cy="-2" r="10" fill="#401D30"/>
      <!-- cream pupils -->
      <circle cx="-20" cy="-5" r="2.6" fill="#FCF3D8"/>
      <circle cx="16"  cy="-5" r="2.6" fill="#FCF3D8"/>
      <!-- smile -->
      <path d="M-12 14 Q 0 24 12 14 Q 6 18 0 18 Q -6 18 -12 14 Z" fill="#401E2B"/>
    </g>
  </defs>

  <!-- ===== sparkles ===== -->
  <g fill="#FFD94A">
    <polygon class="sparkle"     points="100,30 103,42 115,45 103,48 100,60 97,48 85,45 97,42"/>
    <polygon class="sparkle sp2" points="430,22 433,33 443,35 433,38 430,48 427,38 417,35 427,33"/>
    <polygon class="sparkle sp3" points="760,26 763,37 773,39 763,42 760,52 757,42 747,39 757,37"/>
    <polygon class="sparkle sp4" points="260,238 262,245 270,247 262,249 260,256 258,249 250,247 258,245"/>
    <polygon class="sparkle sp5" points="620,242 622,249 630,251 622,253 620,260 618,253 610,251 618,249"/>
  </g>

  <!-- ===== little floating hearts ===== -->
  <g>
    <g transform="translate(172, 32)">
      <path class="heartbeat" d="M0 4 C -7 -4, -15 -1, -12 7 C -9 13, 0 18, 0 18 C 0 18, 9 13, 12 7 C 15 -1, 7 -4, 0 4 Z" fill="#FB6A76"/>
    </g>
    <g transform="translate(716, 36)">
      <path class="heartbeat" d="M0 4 C -7 -4, -15 -1, -12 7 C -9 13, 0 18, 0 18 C 0 18, 9 13, 12 7 C 15 -1, 7 -4, 0 4 Z" fill="#FB6A76" style="animation-delay:0.6s"/>
    </g>
  </g>

  <!-- ========================= 5 COCO FRIENDS ========================= -->

  <!-- #1 Waving -->
  <g transform="translate(110, 150)">
    <g class="float">
      <use href="#coco-base"/>
      <g class="wave" transform="translate(52, 6)">
        <rect x="-5" y="0" width="10" height="30" rx="5" fill="#BE5133"/>
        <circle cx="0" cy="-2" r="8" fill="#E59A63"/>
      </g>
    </g>
    <text y="86" text-anchor="middle" font-family="JetBrains Mono, ui-monospace, monospace" font-size="12" font-weight="700" fill="#FCF3D8" opacity="0.8">hi 👋</text>
  </g>

  <!-- #2 Holding heart -->
  <g transform="translate(290, 150)">
    <g class="float d2">
      <use href="#coco-base"/>
      <g class="heartbeat" transform="translate(0, 48)">
        <path d="M0 4 C -12 -8, -26 -2, -20 10 C -14 22, 0 30, 0 30 C 0 30, 14 22, 20 10 C 26 -2, 12 -8, 0 4 Z" fill="#FB6A76"/>
      </g>
    </g>
    <text y="96" text-anchor="middle" font-family="JetBrains Mono, ui-monospace, monospace" font-size="12" font-weight="700" fill="#FCF3D8" opacity="0.8">love it</text>
  </g>

  <!-- #3 PR tag (center, slightly larger) -->
  <g transform="translate(470, 142)">
    <g class="float d3">
      <g transform="scale(1.16)">
        <use href="#coco-base"/>
      </g>
      <g transform="translate(-54, 76)">
        <rect x="0" y="0" width="108" height="28" rx="8" fill="#2A121B" stroke="#F5B07F" stroke-width="1.4"/>
        <text x="54" y="19" text-anchor="middle" font-family="JetBrains Mono, ui-monospace, monospace" font-size="13" font-weight="700" fill="#F5B07F">PR #42</text>
      </g>
    </g>
  </g>

  <!-- #4 Wrench -->
  <g transform="translate(650, 150)">
    <g class="float d4">
      <use href="#coco-base"/>
      <g transform="translate(40, 38) rotate(40)">
        <rect x="0" y="-5" width="32" height="10" rx="2" fill="#86C3CB"/>
        <circle cx="34" cy="0" r="9" fill="none" stroke="#86C3CB" stroke-width="5"/>
      </g>
    </g>
    <text y="86" text-anchor="middle" font-family="JetBrains Mono, ui-monospace, monospace" font-size="12" font-weight="700" fill="#FCF3D8" opacity="0.8">fixed!</text>
  </g>

  <!-- #5 High-five -->
  <g transform="translate(820, 150)">
    <g class="float d5">
      <use href="#coco-base"/>
      <g>
        <rect x="-58" y="-30" width="10" height="32" rx="5" fill="#BE5133"/>
        <circle class="pulse" cx="-53" cy="-34" r="10" fill="#E59A63"/>
      </g>
    </g>
    <text y="86" text-anchor="middle" font-family="JetBrains Mono, ui-monospace, monospace" font-size="12" font-weight="700" fill="#FCF3D8" opacity="0.8">high-5!</text>
  </g>
</svg>
