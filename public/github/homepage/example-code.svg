<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 600 320" role="img" aria-label="Real-time code index — walk a git repo, AST-chunk source files with an AST-aware splitter, embed with sentence-transformers, and upsert to pgvector / LanceDB. Incremental on every commit. Python. Keywords: code search, code embedding, semantic code retrieval, AST chunking, coding agent, RAG.">
  <title>Real-time code index</title>
  <desc>Git-commit timeline feeding AST chunks into a vector store; built with CocoIndex; incremental on every commit; palette sky-blue.</desc>
  <defs>
    <linearGradient id="cd-t" x1="0" y1="0" x2="1" y2="0">
      <stop offset="0%" stop-color="#7FD8FF"/>
      <stop offset="100%" stop-color="#C9B3FF"/>
    </linearGradient>
    <marker id="cd-arr" viewBox="0 0 10 10" refX="9" refY="5" markerWidth="7" markerHeight="7" orient="auto">
      <path d="M0 0 L10 5 L0 10 z" fill="#6DFFB0"/>
    </marker>
    <style>
      .flow { stroke-dasharray: 4 6; animation: mv 1.4s linear infinite; }
      @keyframes mv { from { stroke-dashoffset: 0 } to { stroke-dashoffset: -20 } }
      .pulse { animation: p 2.4s ease-in-out infinite; transform-origin: center; transform-box: fill-box; }
      @keyframes p { 0%,100% { opacity: 1; transform: scale(1) } 50% { opacity: 0.55; transform: scale(1.2) } }
    </style>
    <pattern id="ex-dots" width="12" height="12" patternUnits="userSpaceOnUse">
      <circle cx="1.5" cy="1.5" r="0.9" fill="#FCF3D8" fill-opacity="0.08"/>
    </pattern>
  </defs>
  <rect x="0.5" y="0.5" width="599" height="319" rx="16" fill="#0D1117" stroke="#30363D" stroke-width="1"/>
  <rect x="0.5" y="0.5" width="599" height="319" rx="16" fill="url(#ex-dots)"/>
  <text x="30" y="54" font-family="Inter, -apple-system, system-ui, sans-serif" font-size="24" font-weight="900" letter-spacing="-0.01em" fill="#7FD8FF">Real-time code index</text>
  <text x="30" y="80" font-family="Inter, -apple-system, system-ui, sans-serif" font-size="13" font-weight="500" fill="rgba(252,243,216,0.75)">AST-chunk · embed · upsert — <tspan fill="#6DFFB0" font-style="italic">incremental on every commit.</tspan></text>

  <g transform="translate(30, 112)">
    <line x1="6" y1="8" x2="380" y2="8" stroke="rgba(252,243,216,0.25)" stroke-width="1.4"/>
    <circle cx="24"  cy="8" r="6" fill="#7FD8FF"/>
    <text x="24"  y="30" text-anchor="middle" font-family="JetBrains Mono, ui-monospace, monospace" font-size="9" fill="rgba(252,243,216,0.55)">a7f3c</text>
    <circle cx="96"  cy="8" r="6" fill="#7FD8FF"/>
    <text x="96"  y="30" text-anchor="middle" font-family="JetBrains Mono, ui-monospace, monospace" font-size="9" fill="rgba(252,243,216,0.55)">91b4e</text>
    <circle cx="168" cy="8" r="6" fill="#7FD8FF"/>
    <text x="168" y="30" text-anchor="middle" font-family="JetBrains Mono, ui-monospace, monospace" font-size="9" fill="rgba(252,243,216,0.55)">3c02d</text>
    <circle cx="240" cy="8" r="6" fill="#7FD8FF"/>
    <text x="240" y="30" text-anchor="middle" font-family="JetBrains Mono, ui-monospace, monospace" font-size="9" fill="rgba(252,243,216,0.55)">d5fa1</text>
    <circle class="pulse" cx="320" cy="8" r="7.5" fill="#FF8A9B"/>
    <text x="320" y="30" text-anchor="middle" font-family="JetBrains Mono, ui-monospace, monospace" font-size="9" font-weight="800" fill="#FF8A9B">HEAD Δ</text>
  </g>

  <g transform="translate(30, 168)">
    <rect width="230" height="94" rx="10" fill="rgba(127,216,255,0.08)"/>
    <text x="14" y="20" font-family="JetBrains Mono, ui-monospace, monospace" font-size="10" letter-spacing="0.18em" font-weight="800" fill="#7FD8FF">AST CHUNKS</text>
    <g font-family="JetBrains Mono, ui-monospace, monospace" font-size="11" fill="#FCF3D8">
      <text x="14" y="40"><tspan fill="#FF8A9B">class</tspan> <tspan fill="#FFD94A">Parser</tspan>:</text>
      <text x="14" y="56"><tspan fill="#C9B3FF">def</tspan> <tspan fill="#FFD94A">tokenize</tspan>(src):</text>
      <text x="14" y="72"><tspan fill="#C9B3FF">def</tspan> <tspan fill="#FFD94A">embed</tspan>(chunk):</text>
      <text x="14" y="88" fill="rgba(252,243,216,0.5)">…</text>
    </g>
  </g>

  <path class="flow" d="M270 215 L 318 215" stroke="#6DFFB0" stroke-width="1.8" fill="none" stroke-linecap="round" marker-end="url(#cd-arr)"/>

  <g transform="translate(330, 168)">
    <rect width="240" height="94" rx="10" fill="rgba(201,179,255,0.08)"/>
    <text x="14" y="20" font-family="JetBrains Mono, ui-monospace, monospace" font-size="10" letter-spacing="0.18em" font-weight="800" fill="#C9B3FF">VECTORS</text>
    <g fill="#C9B3FF">
      <circle cx="24"  cy="46" r="2.4"/><circle cx="48"  cy="62" r="2"/><circle cx="72"  cy="40" r="2.4"/>
      <circle cx="98"  cy="56" r="2"/><circle cx="124" cy="44" r="2.4"/><circle cx="148" cy="68" r="2"/>
      <circle cx="174" cy="50" r="2.6"/><circle cx="200" cy="44" r="2"/><circle cx="32"  cy="72" r="2"/>
      <circle cx="64"  cy="78" r="2.2"/><circle cx="108" cy="80" r="2"/><circle cx="140" cy="86" r="2.2"/>
      <circle cx="180" cy="82" r="2"/><circle cx="218" cy="66" r="2.4"/><circle cx="222" cy="82" r="2"/>
    </g>
  </g>

  <g transform="translate(30, 286)" font-family="JetBrains Mono, ui-monospace, monospace" font-size="9" letter-spacing="0.14em" font-weight="700">
    <rect width="62" height="20" rx="10" fill="rgba(127,216,255,0.14)"/>
    <text x="31" y="10" text-anchor="middle" dominant-baseline="central" fill="#7FD8FF">PYTHON</text>
    <g transform="translate(70, 0)"><rect width="78" height="20" rx="10" fill="rgba(201,179,255,0.14)"/><text x="39" y="10" text-anchor="middle" dominant-baseline="central" fill="#C9B3FF">PGVECTOR</text></g>
    <g transform="translate(156, 0)"><rect width="76" height="20" rx="10" fill="rgba(255,217,74,0.14)"/><text x="38" y="10" text-anchor="middle" dominant-baseline="central" fill="#FFD94A">LANCEDB</text></g>
    <text x="540" y="10" text-anchor="end" dominant-baseline="central" font-weight="800" fill="rgba(252,243,216,0.75)">GITHUB →</text>
  </g>
</svg>
