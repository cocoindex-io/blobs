<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 2080 720" role="img" aria-label="CocoInsight on the left, persistent data pipeline control plane on the right: 8 subsystems arranged 3×3 around a central Core. Each subsystem tile shows a large icon on the left and the name + one-line description on the right.">
  <defs>
    <pattern id="cp-dots" x="0" y="0" width="16" height="16" patternUnits="userSpaceOnUse">
      <circle cx="8" cy="8" r="1.4" fill="#FCF3D8" opacity="0.22"/>
    </pattern>
    <marker id="cp-arrow" viewBox="0 0 10 10" refX="9" refY="5" markerWidth="6" markerHeight="6" orient="auto-start-reverse">
      <path d="M0,0 L10,5 L0,10 z" fill="#BE5133"/>
    </marker>
    <style>
      .live    { animation: liv 1.6s ease-in-out infinite; }
      @keyframes liv { 0%,100% { opacity: 1 } 50% { opacity: 0.45 } }
      .march   { stroke-dasharray: 4 4; animation: mch 1.2s linear infinite; }
      @keyframes mch  { from { stroke-dashoffset: 0 } to { stroke-dashoffset: -16 } }
      .ripple  { animation: rip 5s ease-in-out infinite; transform-origin: center; transform-box: fill-box; }
      @keyframes rip { 0%, 82%, 100% { opacity: 0.55; transform: scale(1); } 42% { opacity: 1; transform: scale(1.18); } }
      .ring-1,
      .ring-2,
      .ring-3 {
        animation: radar 3s ease-out infinite;
        transform-origin: center;
        transform-box: fill-box;
      }
      .ring-2 { animation-delay: 1s; }
      .ring-3 { animation-delay: 2s; }
      @keyframes radar {
        0%   { transform: scale(0.45); opacity: 0.9; }
        100% { transform: scale(2.2);  opacity: 0;   }
      }
      .core-dot {
        animation: coreDot 3s ease-in-out infinite;
        transform-origin: center;
        transform-box: fill-box;
      }
      @keyframes coreDot {
        0%,100% { transform: scale(1);    }
        50%     { transform: scale(1.12); }
      }
    </style>
  </defs>

  <!-- ============ CocoInsight (left) ============ -->
  <g>
    <rect x="0" y="0" width="420" height="720" rx="10" fill="none"/>
    <text x="210" y="72" text-anchor="middle" font-family="Inter, -apple-system, system-ui, sans-serif" font-size="30" font-weight="600" letter-spacing="-0.8" fill="#FCF3D8">CocoInsight</text>
    <g transform="translate(28, 58)">
      <circle class="live" cx="0" cy="0" r="6" fill="#27E62B"/>
      <text x="16" y="5" font-family="JetBrains Mono, ui-monospace, monospace" font-size="14" letter-spacing="1.4" fill="#FCF3D8">LIVE</text>
    </g>

    <!-- Lineage tile -->
    <g>
      <rect x="30" y="118" width="360" height="270" rx="10" fill="rgba(252,243,216,0.08)" stroke="rgba(252,243,216,0.28)" stroke-width="1"/>
      <rect x="30" y="118" width="360" height="270" rx="10" fill="url(#cp-dots)" pointer-events="none"/>
      <g transform="translate(58, 140) scale(1.6)" stroke-width="1.6" fill="none">
        <circle cx="4" cy="4" r="2.4" stroke="#FCF3D8"/>
        <circle cx="24" cy="4" r="2.4" stroke="#FCF3D8"/>
        <circle cx="14" cy="14" r="2.6" fill="#FCF3D8" stroke="#FCF3D8"/>
        <circle cx="8" cy="24" r="2.4" stroke="#FCF3D8"/>
        <circle cx="20" cy="24" r="2.4" stroke="#FCF3D8"/>
        <path d="M6 6l6 6M22 6l-6 6M13 16l-4 6M15 16l4 6" stroke="#FCF3D8"/>
      </g>
      <text x="58" y="236" font-family="Inter, -apple-system, system-ui, sans-serif" font-size="22" font-weight="600" fill="#FCF3D8" letter-spacing="-0.3">Lineage</text>
      <g transform="translate(58, 264)">
        <g stroke="#FCF3D8" stroke-opacity="0.55" stroke-width="1.6" fill="none">
          <path d="M18 42 C 68 42, 68 12, 128 12"/>
          <path d="M18 42 C 68 42, 68 72, 128 72"/>
          <path d="M148 12 C 198 12, 198 42, 238 42"/>
          <path d="M148 72 C 198 72, 198 42, 238 42"/>
          <line x1="258" y1="42" x2="302" y2="42"/>
        </g>
        <circle cx="18" cy="42" r="11" fill="#FCF3D8"/>
        <circle cx="138" cy="12" r="9" fill="#FCF3D8" opacity="0.8"/>
        <circle cx="138" cy="72" r="9" fill="#FCF3D8" opacity="0.8"/>
        <circle cx="248" cy="42" r="12" fill="#532638"/>
        <circle cx="312" cy="42" r="11" fill="#FCF3D8"/>
        <g font-family="JetBrains Mono, ui-monospace, monospace" font-size="11" fill="#FCF3D8" text-anchor="middle">
          <text x="18" y="72">src</text>
          <text x="312" y="72">sink</text>
        </g>
      </g>
    </g>

    <!-- Observability tile -->
    <g>
      <rect x="30" y="404" width="360" height="288" rx="10" fill="rgba(252,243,216,0.08)" stroke="rgba(252,243,216,0.28)" stroke-width="1"/>
      <rect x="30" y="404" width="360" height="288" rx="10" fill="url(#cp-dots)" pointer-events="none"/>
      <g transform="translate(58, 428) scale(1.7)" stroke-width="2.6" fill="none" stroke-linecap="round">
        <line x1="4" y1="25" x2="4" y2="16" stroke="#FCF3D8"/>
        <line x1="14" y1="25" x2="14" y2="4" stroke="#FCF3D8"/>
        <line x1="24" y1="25" x2="24" y2="11" stroke="#FCF3D8"/>
      </g>
      <text x="58" y="528" font-family="Inter, -apple-system, system-ui, sans-serif" font-size="22" font-weight="600" fill="#FCF3D8" letter-spacing="-0.3">Observability</text>
      <g transform="translate(58, 554)">
        <rect x="0"   y="70"   width="16" height="30"  rx="2" fill="#FCF3D8" opacity="0.55"/>
        <rect x="24"  y="56"   width="16" height="44"  rx="2" fill="#FCF3D8" opacity="0.6"/>
        <rect x="48"  y="32"   width="16" height="68"  rx="2" fill="#FCF3D8" opacity="0.65"/>
        <rect x="72"  y="78"   width="16" height="22"  rx="2" fill="#FCF3D8" opacity="0.7"/>
        <rect x="96"  y="50"   width="16" height="50"  rx="2" fill="#FCF3D8" opacity="0.75"/>
        <rect x="120" y="26"   width="16" height="74"  rx="2" fill="#FCF3D8" opacity="0.8"/>
        <rect x="144" y="12"   width="16" height="88"  rx="2" fill="#FCF3D8" opacity="0.85"/>
        <rect x="168" y="38"   width="16" height="62"  rx="2" fill="#FCF3D8" opacity="0.9"/>
        <rect x="192" y="62"   width="16" height="38"  rx="2" fill="#FCF3D8" opacity="0.95"/>
        <rect x="216" y="42"   width="16" height="58"  rx="2" fill="#FCF3D8" opacity="0.9"/>
        <rect x="240" y="20"   width="16" height="80"  rx="2" fill="#FCF3D8" opacity="0.95"/>
        <rect x="264" y="8"    width="16" height="92"  rx="2" fill="#FCF3D8"/>
        <rect x="288" y="44"   width="16" height="56"  rx="2" fill="#FCF3D8" opacity="0.9"/>
        <line x1="0" y1="102" x2="306" y2="102" stroke="#FCF3D8" stroke-opacity="0.4"/>
      </g>
    </g>
  </g>

  <!-- arrows between CocoInsight and Control Plane -->
  <g stroke="#BE5133" stroke-width="1.6" fill="none">
    <line class="march" x1="420" y1="340" x2="480" y2="340" marker-end="url(#cp-arrow)"/>
    <line class="march" x1="480" y1="380" x2="420" y2="380" marker-end="url(#cp-arrow)"/>
  </g>

  <!-- ============ Control Plane (right) — 3×3 around a core ============ -->
  <g transform="translate(480, 0)">
    <rect x="0" y="0" width="1600" height="720" rx="10" fill="none"/>
    <text x="800" y="72" text-anchor="middle" font-family="Inter, -apple-system, system-ui, sans-serif" font-size="30" font-weight="600" letter-spacing="-0.8" fill="#FCF3D8">Persistent Data Pipeline <tspan fill="#E59A63">Control Plane</tspan></text>
    <g transform="translate(40, 58)">
      <circle class="live" cx="0" cy="0" r="6" fill="#27E62B"/>
      <text x="16" y="5" font-family="JetBrains Mono, ui-monospace, monospace" font-size="14" letter-spacing="1.4" fill="#FCF3D8">LIVE</text>
    </g>

    <!-- 3×3 grid: tile 496×176; col_x={40,552,1064}; row_y={120,312,504} -->
    <!-- Each tile: icon LEFT (centered in ~140px column at scale 2.6),
                   text RIGHT (title 24 / caption 14 / tag 10 stacked) -->

    <!-- (0,0) CACHING -->
    <g>
      <rect x="40" y="120" width="496" height="176" rx="10" fill="rgba(252,243,216,0.06)" stroke="rgba(252,243,216,0.22)" stroke-width="1"/>
      <rect x="40" y="120" width="496" height="176" rx="10" fill="url(#cp-dots)"/>
      <g transform="translate(75, 169) scale(2.6)" stroke-width="1.6" fill="none">
        <rect x="0" y="12" width="28" height="14" rx="2" stroke="#FCF3D8"/>
        <rect x="2" y="6" width="24" height="7" rx="1.5" stroke="#FCF3D8"/>
        <rect class="ripple" x="4" y="1" width="20" height="4" rx="1" stroke="#E59A63"/>
      </g>
      <text x="190" y="194" font-family="Inter, -apple-system, system-ui, sans-serif" font-size="24" font-weight="600" fill="#FCF3D8" letter-spacing="-0.3">Caching</text>
      <text x="190" y="226" font-family="Inter, -apple-system, system-ui, sans-serif" font-size="14" fill="rgba(252,243,216,0.85)">Reuse what hasn't changed.</text>
      <text x="190" y="256" font-family="JetBrains Mono, ui-monospace, monospace" font-size="10" letter-spacing="0.18em" fill="#E59A63">INCREMENTAL</text>
    </g>

    <!-- (0,1) VERSION TRACKING -->
    <g>
      <rect x="552" y="120" width="496" height="176" rx="10" fill="rgba(252,243,216,0.06)" stroke="rgba(252,243,216,0.22)" stroke-width="1"/>
      <rect x="552" y="120" width="496" height="176" rx="10" fill="url(#cp-dots)"/>
      <g transform="translate(587, 169) scale(2.6)" stroke-width="1.6" fill="none">
        <circle cx="6" cy="6" r="2.4" stroke="#FCF3D8"/>
        <circle cx="22" cy="6" r="2.4" stroke="#FCF3D8"/>
        <circle class="ripple" cx="14" cy="22" r="2.4" fill="#E59A63" stroke="#E59A63"/>
        <path d="M6 9v4a4 4 0 004 4h4M22 9v4a4 4 0 01-4 4h-4" stroke="#FCF3D8"/>
      </g>
      <text x="702" y="194" font-family="Inter, -apple-system, system-ui, sans-serif" font-size="24" font-weight="600" fill="#FCF3D8" letter-spacing="-0.3">Version Tracking</text>
      <text x="702" y="226" font-family="Inter, -apple-system, system-ui, sans-serif" font-size="14" fill="rgba(252,243,216,0.85)">Code, schema, data — versioned.</text>
      <text x="702" y="256" font-family="JetBrains Mono, ui-monospace, monospace" font-size="10" letter-spacing="0.18em" fill="#E59A63">PROVENANCE</text>
    </g>

    <!-- (0,2) LINEAGE -->
    <g>
      <rect x="1064" y="120" width="496" height="176" rx="10" fill="rgba(252,243,216,0.06)" stroke="rgba(252,243,216,0.22)" stroke-width="1"/>
      <rect x="1064" y="120" width="496" height="176" rx="10" fill="url(#cp-dots)"/>
      <g transform="translate(1099, 169) scale(2.6)" stroke-width="1.6" fill="none">
        <circle cx="4" cy="4" r="2.4" stroke="#FCF3D8"/>
        <circle cx="24" cy="4" r="2.4" stroke="#FCF3D8"/>
        <circle class="ripple" cx="14" cy="14" r="2.6" fill="#E59A63" stroke="#E59A63"/>
        <circle cx="8" cy="24" r="2.4" stroke="#FCF3D8"/>
        <circle cx="20" cy="24" r="2.4" stroke="#FCF3D8"/>
        <path d="M6 6l6 6M22 6l-6 6M13 16l-4 6M15 16l4 6" stroke="#FCF3D8"/>
      </g>
      <text x="1214" y="194" font-family="Inter, -apple-system, system-ui, sans-serif" font-size="24" font-weight="600" fill="#FCF3D8" letter-spacing="-0.3">Lineage</text>
      <text x="1214" y="226" font-family="Inter, -apple-system, system-ui, sans-serif" font-size="14" fill="rgba(252,243,216,0.85)">Every byte traces to a source.</text>
      <text x="1214" y="256" font-family="JetBrains Mono, ui-monospace, monospace" font-size="10" letter-spacing="0.18em" fill="#E59A63">AUDITABLE</text>
    </g>

    <!-- (1,0) PIPELINE CATALOG -->
    <g>
      <rect x="40" y="312" width="496" height="176" rx="10" fill="rgba(252,243,216,0.06)" stroke="rgba(252,243,216,0.22)" stroke-width="1"/>
      <rect x="40" y="312" width="496" height="176" rx="10" fill="url(#cp-dots)"/>
      <g transform="translate(75, 361) scale(2.6)" stroke-width="1.6" fill="none">
        <rect x="2" y="2" width="22" height="22" rx="2" stroke="#FCF3D8"/>
        <path d="M2 8h22M2 20h22" stroke="#FCF3D8"/>
        <path class="ripple" d="M2 14h22" stroke="#E59A63"/>
      </g>
      <text x="190" y="386" font-family="Inter, -apple-system, system-ui, sans-serif" font-size="24" font-weight="600" fill="#FCF3D8" letter-spacing="-0.3">Pipeline Catalog</text>
      <text x="190" y="418" font-family="Inter, -apple-system, system-ui, sans-serif" font-size="14" fill="rgba(252,243,216,0.85)">Every flow registered · fork, reuse.</text>
      <text x="190" y="448" font-family="JetBrains Mono, ui-monospace, monospace" font-size="10" letter-spacing="0.18em" fill="#E59A63">REGISTRY</text>
    </g>

    <!-- (1,1) CENTER · CORE (transparent, radar-pulse rings) -->
    <g>
      <circle class="ring-1" cx="800" cy="400" r="60" fill="none" stroke="#BE5133" stroke-width="2.5"/>
      <circle class="ring-2" cx="800" cy="400" r="60" fill="none" stroke="#BE5133" stroke-width="2.5"/>
      <circle class="ring-3" cx="800" cy="400" r="60" fill="none" stroke="#BE5133" stroke-width="2.5"/>
      <circle class="core-dot" cx="800" cy="400" r="34" fill="#BE5133"/>
      <text x="800" y="406" text-anchor="middle" font-family="Inter, -apple-system, system-ui, sans-serif" font-size="17" font-weight="700" letter-spacing="-0.2" fill="#FCF3D8">Core</text>
    </g>

    <!-- (1,2) CONTINUOUSLY LEARNING -->
    <g>
      <rect x="1064" y="312" width="496" height="176" rx="10" fill="rgba(252,243,216,0.06)" stroke="rgba(252,243,216,0.22)" stroke-width="1"/>
      <rect x="1064" y="312" width="496" height="176" rx="10" fill="url(#cp-dots)"/>
      <g transform="translate(1099, 361) scale(2.6)" stroke-width="1.6" fill="none" stroke-linecap="round">
        <path d="M24 14a10 10 0 11-3-7" stroke="#FCF3D8"/>
        <polyline class="ripple" points="24,3 24,11 16,11" stroke="#E59A63"/>
      </g>
      <text x="1214" y="386" font-family="Inter, -apple-system, system-ui, sans-serif" font-size="24" font-weight="600" fill="#FCF3D8" letter-spacing="-0.3">Continuously Learning</text>
      <text x="1214" y="418" font-family="Inter, -apple-system, system-ui, sans-serif" font-size="14" fill="rgba(252,243,216,0.85)">The engine adapts as code evolves.</text>
      <text x="1214" y="448" font-family="JetBrains Mono, ui-monospace, monospace" font-size="10" letter-spacing="0.18em" fill="#E59A63">ADAPTIVE</text>
    </g>

    <!-- (2,0) TASK SCHEDULING -->
    <g>
      <rect x="40" y="504" width="496" height="176" rx="10" fill="rgba(252,243,216,0.06)" stroke="rgba(252,243,216,0.22)" stroke-width="1"/>
      <rect x="40" y="504" width="496" height="176" rx="10" fill="url(#cp-dots)"/>
      <g transform="translate(75, 553) scale(2.6)" stroke-width="1.6" fill="none" stroke-linecap="round">
        <circle cx="14" cy="14" r="11" stroke="#FCF3D8"/>
        <path d="M14 7v7" stroke="#FCF3D8"/>
        <path class="ripple" d="M14 14l4 3" stroke="#E59A63" stroke-width="2"/>
      </g>
      <text x="190" y="578" font-family="Inter, -apple-system, system-ui, sans-serif" font-size="24" font-weight="600" fill="#FCF3D8" letter-spacing="-0.3">Task Scheduling</text>
      <text x="190" y="610" font-family="Inter, -apple-system, system-ui, sans-serif" font-size="14" fill="rgba(252,243,216,0.85)">Parallel by default · low-latency.</text>
      <text x="190" y="640" font-family="JetBrains Mono, ui-monospace, monospace" font-size="10" letter-spacing="0.18em" fill="#E59A63">CONCURRENT</text>
    </g>

    <!-- (2,1) METRICS COLLECTION -->
    <g>
      <rect x="552" y="504" width="496" height="176" rx="10" fill="rgba(252,243,216,0.06)" stroke="rgba(252,243,216,0.22)" stroke-width="1"/>
      <rect x="552" y="504" width="496" height="176" rx="10" fill="url(#cp-dots)"/>
      <g transform="translate(587, 553) scale(2.6)" stroke-width="2.6" fill="none" stroke-linecap="round">
        <line x1="4" y1="25" x2="4" y2="16" stroke="#FCF3D8"/>
        <line class="ripple" x1="14" y1="25" x2="14" y2="4" stroke="#E59A63"/>
        <line x1="24" y1="25" x2="24" y2="11" stroke="#FCF3D8"/>
      </g>
      <text x="702" y="578" font-family="Inter, -apple-system, system-ui, sans-serif" font-size="24" font-weight="600" fill="#FCF3D8" letter-spacing="-0.3">Metrics Collection</text>
      <text x="702" y="610" font-family="Inter, -apple-system, system-ui, sans-serif" font-size="14" fill="rgba(252,243,216,0.85)">Throughput, freshness, cost — all visible.</text>
      <text x="702" y="640" font-family="JetBrains Mono, ui-monospace, monospace" font-size="10" letter-spacing="0.18em" fill="#E59A63">OBSERVABLE</text>
    </g>

    <!-- (2,2) FAILURE MANAGEMENT -->
    <g>
      <rect x="1064" y="504" width="496" height="176" rx="10" fill="rgba(252,243,216,0.06)" stroke="rgba(252,243,216,0.22)" stroke-width="1"/>
      <rect x="1064" y="504" width="496" height="176" rx="10" fill="url(#cp-dots)"/>
      <g transform="translate(1099, 553) scale(2.6)" stroke-width="1.6" fill="none" stroke-linejoin="round" stroke-linecap="round">
        <path d="M14 2l10 4v7c0 6-4 10-10 12-6-2-10-6-10-12V6l10-4z" stroke="#FCF3D8"/>
        <path class="ripple" d="M9 14l3.5 3.5L20 10" stroke="#E59A63" stroke-width="2"/>
      </g>
      <text x="1214" y="578" font-family="Inter, -apple-system, system-ui, sans-serif" font-size="24" font-weight="600" fill="#FCF3D8" letter-spacing="-0.3">Failure Management</text>
      <text x="1214" y="610" font-family="Inter, -apple-system, system-ui, sans-serif" font-size="14" fill="rgba(252,243,216,0.85)">Retries, back-off, dead letters.</text>
      <text x="1214" y="640" font-family="JetBrains Mono, ui-monospace, monospace" font-size="10" letter-spacing="0.18em" fill="#E59A63">RESILIENT</text>
    </g>
  </g>
</svg>
