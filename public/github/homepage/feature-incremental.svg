<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 200 200" role="img" aria-label="Incremental processing — only the delta runs">
  <defs>
    <style>
      .pulse { animation: p 1.6s ease-in-out infinite; }
      @keyframes p { 0%,100% { opacity: 1 } 50% { opacity: 0.45 } }
      .tick { animation: t 1.6s ease-in-out infinite; }
      @keyframes t { 0%,100% { opacity: 0; transform: translateX(-4px); } 50% { opacity: 1; transform: translateX(0); } }
    </style>
  </defs>
  <rect width="200" height="200" rx="14" fill="#FCF3D8"/>
  <text x="100" y="32" text-anchor="middle" font-family="Inter, -apple-system, system-ui, sans-serif" font-size="13" font-weight="700" fill="#2A121B">Incremental processing</text>

  <!-- 5 rows; the middle row is the active Δ row -->
  <g transform="translate(20, 60)">
    <g stroke="#532638" stroke-opacity="0.3" stroke-width="1" fill="rgba(83,38,56,0.05)">
      <rect x="10" y="0"  width="140" height="14" rx="3"/>
      <rect x="10" y="22" width="140" height="14" rx="3"/>
      <rect x="10" y="66" width="140" height="14" rx="3"/>
      <rect x="10" y="88" width="140" height="14" rx="3"/>
    </g>
    <rect class="pulse" x="10" y="44" width="140" height="14" rx="3"
          fill="rgba(190,81,51,0.32)" stroke="#BE5133" stroke-width="1.6"/>
    <text x="146" y="55" text-anchor="end" font-family="JetBrains Mono, ui-monospace, monospace" font-size="9" font-weight="700" fill="#BE5133" letter-spacing="0.06em">Δ +1</text>
    <circle class="tick" cx="0" cy="51" r="4" fill="#27E62B" style="transform-box: fill-box; transform-origin: center;"/>
  </g>

  <text x="100" y="180" text-anchor="middle" font-family="Inter, -apple-system, system-ui, sans-serif" font-size="11" fill="#532638">Only the delta is reindexed.</text>
</svg>
