<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 720 120" role="img" aria-label="We love Contributors — section title with a pulsing coral heart badge. Every typo fix, new connector, and doc tweak makes CocoIndex better. Keywords: open-source contribution, pull request, typo fix, new connector, good first issue, Hacktoberfest, community, coconut heart.">
  <title>We love Contributors (light theme)</title>
  <desc>Light-theme section-title banner. A brand-pink heart badge on the left gently pulses with a warm coral glow behind it, followed by the inline title 'We love Contributors' with the italic 'love' in the brand amber→coral→peach gradient. Small warm twinkle sparkles flank the heart, and a mono sub-line 'THANK YOU FOR BEING HERE · PRS BIG &amp; SMALL · 🥥' sits just below the title in ink.</desc>

  <defs>
    <linearGradient id="wlc-grad" x1="0" y1="0" x2="1" y2="0">
      <stop offset="0%"   stop-color="#B45309"/>
      <stop offset="50%"  stop-color="#BE5133"/>
      <stop offset="100%" stop-color="#E59A63"/>
    </linearGradient>
    <radialGradient id="wlc-glow" cx="50%" cy="50%" r="55%">
      <stop offset="0%"   stop-color="#FB6A76" stop-opacity="0.35"/>
      <stop offset="70%"  stop-color="#FB6A76" stop-opacity="0.06"/>
      <stop offset="100%" stop-color="#FB6A76" stop-opacity="0"/>
    </radialGradient>
    <style>
      .wlc-beat    { transform-origin: 0 0; animation: wlcB 1.4s ease-in-out infinite; }
      @keyframes wlcB { 0%,100% { transform: scale(1) } 25% { transform: scale(1.1) } 50% { transform: scale(1) } 75% { transform: scale(1.06) } }
      .wlc-twinkle { transform-origin: 0 0; animation: wlcT 2.4s ease-in-out infinite; }
      @keyframes wlcT { 0%,100% { opacity: 0.35; transform: scale(0.9) } 50% { opacity: 1; transform: scale(1.2) } }
    </style>
  </defs>

  <!-- soft warm glow behind the heart — visible as a faint pink halo on white -->
  <circle cx="72" cy="60" r="56" fill="url(#wlc-glow)"/>

  <!-- heart badge — brand-pink disc with cream heart (super cute, high internal contrast) -->
  <g transform="translate(72, 60)">
    <g class="wlc-beat">
      <circle r="30" fill="#FB6A76"/>
      <circle r="30" fill="none" stroke="#2A121B" stroke-opacity="0.2" stroke-width="1.2"/>
      <!-- heart glyph, centered at (0,0) -->
      <path d="M 0 10
               C -3 6, -13 1, -13 -6
               C -13 -11, -8 -14, -5 -14
               C -2 -14, 0 -12, 0 -9
               C 0 -12, 2 -14, 5 -14
               C 8 -14, 13 -11, 13 -6
               C 13 1, 3 6, 0 10 Z"
            fill="#FCF3D8"/>
    </g>
  </g>

  <!-- twinkle sparkles — warm accents that read as little glints on white -->
  <g transform="translate(28, 28)"><circle class="wlc-twinkle" r="1.8" fill="#BE5133"/></g>
  <g transform="translate(124, 24)"><circle class="wlc-twinkle" r="1.6" fill="#B45309" style="animation-delay:0.4s"/></g>
  <g transform="translate(130, 96)"><circle class="wlc-twinkle" r="1.8" fill="#BE5133" style="animation-delay:0.8s"/></g>
  <g transform="translate(22, 94)"><circle class="wlc-twinkle" r="1.4" fill="#B45309" style="animation-delay:1.2s"/></g>

  <!-- title — ink 'We' + 'Contributors' with gradient 'love' -->
  <text x="140" y="58" dominant-baseline="central"
        font-family="Inter, -apple-system, system-ui, sans-serif" font-size="44"
        font-weight="900" letter-spacing="-0.03em" fill="#2A121B">
    We <tspan fill="#B45309" font-style="italic">love</tspan> Contributors
  </text>

  <!-- sub-line -->
  <text x="140" y="90" dominant-baseline="central"
        font-family="JetBrains Mono, ui-monospace, monospace" font-size="11"
        letter-spacing="0.22em" font-weight="700" fill="rgba(42,18,27,0.6)">
    THANK YOU FOR BEING HERE · PRS BIG &amp; SMALL · 🥥
  </text>
</svg>
