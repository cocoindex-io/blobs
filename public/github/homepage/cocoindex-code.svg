<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 1200 240" role="img" aria-label="CocoIndex-code keeps a live index of your repo — call graphs, symbols, vectors, chunks — and streams that fresh context to your coding agent.">
  <defs>
    <pattern id="cv-dots" x="0" y="0" width="14" height="14" patternUnits="userSpaceOnUse">
      <circle cx="7" cy="7" r="1.2" fill="#532638" opacity="0.14"/>
    </pattern>
    <marker id="cv-ah" viewBox="0 0 10 10" refX="9" refY="5" markerWidth="6" markerHeight="6" orient="auto">
      <path d="M0 0 L10 5 L0 10 z" fill="#BE5133"/>
    </marker>
    <style>
      .pulse { animation: p 1.6s ease-in-out infinite; }
      @keyframes p { 0%,100% { opacity: 1 } 50% { opacity: 0.35 } }
      .twinkle { animation: tw 3s ease-in-out infinite; }
      @keyframes tw { 0%,100% { opacity: 0.4 } 50% { opacity: 1 } }
      .blink { animation: bl 1.2s steps(2,end) infinite; }
      @keyframes bl { 0%,49% { opacity: 1 } 50%,100% { opacity: 0 } }
    </style>
  </defs>

  <rect width="1200" height="240" fill="#FCF3D8"/>

  <!-- ===== YOUR REPO panel (left) ===== -->
  <g>
    <text x="20" y="42" font-family="JetBrains Mono, ui-monospace, monospace" font-size="9" fill="rgba(42,18,27,0.58)" letter-spacing="0.14em">YOUR REPO</text>
    <g font-family="JetBrains Mono, ui-monospace, monospace" font-size="11" fill="#2A121B">
      <line x1="28" y1="62" x2="28" y2="204" stroke="#532638" stroke-opacity="0.32" stroke-width="1"/>

      <rect x="42" y="61" width="9" height="9" rx="1" fill="none" stroke="#532638" stroke-width="1"/>
      <text x="57" y="70">src/</text>
      <line x1="28" y1="66" x2="40" y2="66" stroke="#532638" stroke-opacity="0.32" stroke-width="1"/>

      <rect x="54" y="80" width="9" height="9" rx="1" fill="none" stroke="#532638" stroke-width="1"/>
      <text x="69" y="89">flow.py</text>
      <circle class="pulse" cx="200" cy="85" r="3" fill="#BE5133"/>
      <line x1="40" y1="85" x2="52" y2="85" stroke="#532638" stroke-opacity="0.32" stroke-width="1"/>

      <rect x="54" y="100" width="9" height="9" rx="1" fill="none" stroke="#532638" stroke-width="1"/>
      <text x="69" y="109">pipeline.py</text>
      <line x1="40" y1="105" x2="52" y2="105" stroke="#532638" stroke-opacity="0.32" stroke-width="1"/>

      <rect x="54" y="120" width="9" height="9" rx="1" fill="none" stroke="#532638" stroke-width="1"/>
      <text x="69" y="129">embed.py</text>
      <line x1="40" y1="125" x2="52" y2="125" stroke="#532638" stroke-opacity="0.32" stroke-width="1"/>

      <rect x="42" y="140" width="9" height="9" rx="1" fill="none" stroke="#532638" stroke-width="1"/>
      <text x="57" y="149">api/</text>
      <line x1="28" y1="145" x2="40" y2="145" stroke="#532638" stroke-opacity="0.32" stroke-width="1"/>

      <rect x="54" y="160" width="9" height="9" rx="1" fill="none" stroke="#532638" stroke-width="1"/>
      <text x="69" y="169">route.ts</text>
      <circle class="pulse" cx="200" cy="165" r="3" fill="#27E62B" style="animation-delay:0.8s"/>
      <line x1="40" y1="165" x2="52" y2="165" stroke="#532638" stroke-opacity="0.32" stroke-width="1"/>

      <rect x="54" y="180" width="9" height="9" rx="1" fill="none" stroke="#532638" stroke-width="1"/>
      <text x="69" y="189">utils.ts</text>
      <line x1="40" y1="185" x2="52" y2="185" stroke="#532638" stroke-opacity="0.32" stroke-width="1"/>
    </g>
  </g>

  <!-- ===== ON CHANGE Δ ===== -->
  <g>
    <text x="262" y="108" font-family="JetBrains Mono, ui-monospace, monospace" font-size="9" fill="rgba(42,18,27,0.58)" letter-spacing="0.14em" text-anchor="middle">ON CHANGE</text>
    <path d="M 232 120 C 252 120, 262 120, 282 120" fill="none" stroke="#BE5133" stroke-width="1.4" stroke-dasharray="3 4" marker-end="url(#cv-ah)"/>
    <text class="pulse" x="262" y="138" font-family="JetBrains Mono, ui-monospace, monospace" font-size="10" fill="#BE5133" text-anchor="middle">Δ</text>
  </g>

  <!-- ===== Center: 4 cells (CALL GRAPH, SYMBOLS, VECTORS, CHUNKS·AST) ===== -->
  <rect x="288" y="14" width="398" height="212" rx="10" fill="url(#cv-dots)"/>

  <!-- CALL GRAPH -->
  <g>
    <text x="306" y="38" font-family="JetBrains Mono, ui-monospace, monospace" font-size="8" fill="rgba(42,18,27,0.58)" letter-spacing="0.14em">CALL GRAPH</text>
    <g stroke="#532638" stroke-opacity="0.45" stroke-width="1" fill="none">
      <line x1="320" y1="80" x2="350" y2="68"/>
      <line x1="350" y1="68" x2="380" y2="84"/>
      <line x1="350" y1="68" x2="410" y2="66"/>
      <line x1="380" y1="84" x2="410" y2="98"/>
    </g>
    <g fill="#532638">
      <circle cx="320" cy="80" r="3.5"/>
      <circle cx="350" cy="68" r="3.5"/>
      <circle cx="380" cy="84" r="3.5"/>
      <circle cx="410" cy="66" r="3.5"/>
      <circle class="pulse" cx="410" cy="98" r="3.5" fill="#BE5133" style="animation-delay:0.4s"/>
    </g>
    <g font-family="JetBrains Mono, ui-monospace, monospace" font-size="7" fill="rgba(42,18,27,0.65)">
      <text x="306" y="96">main</text>
      <text x="416" y="92">embed</text>
    </g>
  </g>

  <!-- SYMBOLS -->
  <g>
    <text x="506" y="38" font-family="JetBrains Mono, ui-monospace, monospace" font-size="8" fill="rgba(42,18,27,0.58)" letter-spacing="0.14em">SYMBOLS</text>
    <g font-family="JetBrains Mono, ui-monospace, monospace" font-size="9" fill="#2A121B">
      <text x="506" y="64">embed</text>
      <rect x="648" y="56" width="22" height="10" rx="5" fill="#532638"/>
      <text x="659" y="64" text-anchor="middle" fill="#FCF3D8" font-size="7">fn</text>
      <text x="506" y="84">Chunker</text>
      <rect class="pulse" x="648" y="76" width="22" height="10" rx="5" fill="#BE5133"/>
      <text x="659" y="84" text-anchor="middle" fill="#FCF3D8" font-size="7">cls</text>
      <text x="506" y="104">sink</text>
      <rect x="648" y="96" width="22" height="10" rx="5" fill="#E59A63"/>
      <text x="659" y="104" text-anchor="middle" fill="#2A121B" font-size="7">mod</text>
    </g>
  </g>

  <!-- VECTORS (45 dots, 5×9) -->
  <g>
    <rect x="294" y="122" width="186" height="98" rx="6" fill="#2A121B"/>
    <text x="306" y="140" font-family="JetBrains Mono, ui-monospace, monospace" font-size="8" fill="rgba(252,243,216,0.62)" letter-spacing="0.14em">VECTORS</text>
    <g fill="#E59A63">
      <!-- r=0 -->
      <circle class="twinkle" cx="306" cy="158" r="2" opacity="0.5" style="animation-delay:0s"/>
      <circle cx="324" cy="158" r="1.6" opacity="0.9"/>
      <circle cx="342" cy="158" r="1.6" opacity="0.9"/>
      <circle cx="360" cy="158" r="2" opacity="0.9"/>
      <circle cx="378" cy="158" r="1.6" opacity="0.5"/>
      <circle class="twinkle" cx="396" cy="158" r="1.6" opacity="0.9" style="animation-delay:0.4s"/>
      <circle cx="414" cy="158" r="2" opacity="0.9"/>
      <circle cx="432" cy="158" r="1.6" opacity="0.9"/>
      <circle cx="450" cy="158" r="1.6" opacity="0.5"/>
      <!-- r=1 -->
      <circle cx="306" cy="170" r="1.6" opacity="0.9"/>
      <circle cx="324" cy="170" r="1.6" opacity="0.5"/>
      <circle cx="342" cy="170" r="2" opacity="0.9"/>
      <circle cx="360" cy="170" r="1.6" opacity="0.9"/>
      <circle class="twinkle" cx="378" cy="170" r="1.6" opacity="0.9" style="animation-delay:0.7s"/>
      <circle cx="396" cy="170" r="2" opacity="0.5"/>
      <circle cx="414" cy="170" r="1.6" opacity="0.9"/>
      <circle cx="432" cy="170" r="1.6" opacity="0.9"/>
      <circle cx="450" cy="170" r="2" opacity="0.9"/>
      <!-- r=2 -->
      <circle cx="306" cy="182" r="1.6" opacity="0.5"/>
      <circle cx="324" cy="182" r="2" opacity="0.9"/>
      <circle cx="342" cy="182" r="1.6" opacity="0.9"/>
      <circle class="twinkle" cx="360" cy="182" r="1.6" opacity="0.9" style="animation-delay:1s"/>
      <circle cx="378" cy="182" r="2" opacity="0.5"/>
      <circle cx="396" cy="182" r="1.6" opacity="0.9"/>
      <circle cx="414" cy="182" r="1.6" opacity="0.9"/>
      <circle cx="432" cy="182" r="2" opacity="0.9"/>
      <circle cx="450" cy="182" r="1.6" opacity="0.5"/>
      <!-- r=3 -->
      <circle cx="306" cy="194" r="2" opacity="0.9"/>
      <circle cx="324" cy="194" r="1.6" opacity="0.9"/>
      <circle class="twinkle" cx="342" cy="194" r="1.6" opacity="0.5" style="animation-delay:1.3s"/>
      <circle cx="360" cy="194" r="2" opacity="0.9"/>
      <circle cx="378" cy="194" r="1.6" opacity="0.9"/>
      <circle cx="396" cy="194" r="1.6" opacity="0.5"/>
      <circle cx="414" cy="194" r="2" opacity="0.9"/>
      <circle cx="432" cy="194" r="1.6" opacity="0.9"/>
      <circle cx="450" cy="194" r="1.6" opacity="0.9"/>
      <!-- r=4 -->
      <circle cx="306" cy="206" r="1.6" opacity="0.5"/>
      <circle class="twinkle" cx="324" cy="206" r="1.6" opacity="0.9" style="animation-delay:1.6s"/>
      <circle cx="342" cy="206" r="2" opacity="0.9"/>
      <circle cx="360" cy="206" r="1.6" opacity="0.9"/>
      <circle cx="378" cy="206" r="1.6" opacity="0.5"/>
      <circle cx="396" cy="206" r="2" opacity="0.9"/>
      <circle cx="414" cy="206" r="1.6" opacity="0.9"/>
      <circle cx="432" cy="206" r="1.6" opacity="0.9"/>
      <circle cx="450" cy="206" r="2" opacity="0.5"/>
    </g>
    <circle class="pulse" cx="468" cy="212" r="2.4" fill="#BE5133" style="animation-delay:0.6s"/>
  </g>

  <!-- CHUNKS · AST -->
  <g>
    <text x="506" y="140" font-family="JetBrains Mono, ui-monospace, monospace" font-size="8" fill="rgba(42,18,27,0.58)" letter-spacing="0.14em">CHUNKS · AST</text>
    <rect x="506" y="152" width="160" height="8" rx="1.5" fill="rgba(190,81,51,0.2)" stroke="#BE5133" stroke-width="1"/>
    <rect x="506" y="166" width="130" height="8" rx="1.5" fill="rgba(190,81,51,0.2)" stroke="#BE5133" stroke-width="1"/>
    <rect x="506" y="180" width="148" height="8" rx="1.5" fill="rgba(190,81,51,0.2)" stroke="#BE5133" stroke-width="1"/>
    <rect x="506" y="194" width="116" height="8" rx="1.5" fill="rgba(190,81,51,0.2)" stroke="#BE5133" stroke-width="1"/>
    <rect x="506" y="208" width="138" height="8" rx="1.5" fill="rgba(190,81,51,0.2)" stroke="#BE5133" stroke-width="1"/>
    <circle class="pulse" cx="668" cy="212" r="2.4" fill="#BE5133" style="animation-delay:1s"/>
  </g>

  <!-- ===== CONTEXT · LIVE · FRESH ===== -->
  <g>
    <text x="726" y="108" font-family="JetBrains Mono, ui-monospace, monospace" font-size="9" fill="rgba(42,18,27,0.58)" letter-spacing="0.14em" text-anchor="middle">CONTEXT</text>
    <path d="M 690 120 C 720 120, 740 120, 770 120" fill="none" stroke="#BE5133" stroke-width="1.4" stroke-dasharray="3 4" marker-end="url(#cv-ah)"/>
    <text x="726" y="138" font-family="JetBrains Mono, ui-monospace, monospace" font-size="9" fill="#BE5133" letter-spacing="0.14em" text-anchor="middle">LIVE · FRESH</text>
  </g>

  <!-- ===== CODING AGENT panel (right) ===== -->
  <g>
    <rect x="784" y="20" width="408" height="200" rx="8" fill="rgba(252,243,216,0.6)" stroke="#532638" stroke-opacity="0.22" stroke-width="1"/>
    <text x="796" y="42" font-family="JetBrains Mono, ui-monospace, monospace" font-size="9" fill="rgba(42,18,27,0.58)" letter-spacing="0.14em">CODING AGENT</text>
    <g>
      <circle cx="1160" cy="36" r="3" fill="#FB6A76"/>
      <circle cx="1172" cy="36" r="3" fill="#E59A63"/>
      <circle cx="1184" cy="36" r="3" fill="#27E62B"/>
    </g>

    <rect x="796" y="58" width="384" height="148" rx="6" fill="#2A121B"/>

    <g font-family="JetBrains Mono, ui-monospace, monospace" font-size="11">
      <text x="812" y="82" fill="#E59A63">▸</text>
      <text x="828" y="82" fill="#FCF3D8">where is <tspan fill="#FB6A76">embed()</tspan> called?</text>
    </g>

    <g font-family="JetBrains Mono, ui-monospace, monospace" font-size="10.5">
      <text x="812" y="110" fill="#27E62B">◯</text>
      <text x="828" y="110" fill="rgba(252,243,216,0.9)">3 callers · freshly indexed</text>
      <text x="828" y="130" fill="#FCF3D8"><tspan fill="#FB6A76">src/flow.py</tspan>:42</text>
      <text x="828" y="148" fill="#FCF3D8"><tspan fill="#FB6A76">src/pipeline.py</tspan>:18</text>
      <text x="828" y="166" fill="#FCF3D8"><tspan fill="#FB6A76">tests/t_embed.py</tspan>:7</text>
    </g>

    <text x="812" y="190" font-family="JetBrains Mono, ui-monospace, monospace" font-size="11" fill="#E59A63">▸</text>
    <rect class="blink" x="828" y="181" width="7" height="12" fill="#27E62B"/>
  </g>
</svg>
