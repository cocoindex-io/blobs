<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 600 320" role="img" aria-label="Podcast → knowledge graph — transcribe YouTube / Spotify audio with speaker diarization, LLM-extract speakers and statements, resolve entities across episodes, store in SurrealDB / Neo4j. Keywords: podcast, diarization, YouTube, Whisper, SurrealDB, knowledge graph, entity resolution.">
  <title>Podcast → knowledge graph</title>
  <desc>Podcast waveform with speaker diarization flowing into a knowledge graph; CocoIndex example; palette peach/coral.</desc>
  <defs>
    <linearGradient id="pc-t" x1="0" y1="0" x2="1" y2="0">
      <stop offset="0%" stop-color="#F5B07F"/>
      <stop offset="100%" stop-color="#C9B3FF"/>
    </linearGradient>
    <marker id="pc-arr" viewBox="0 0 10 10" refX="9" refY="5" markerWidth="7" markerHeight="7" orient="auto">
      <path d="M0 0 L10 5 L0 10 z" fill="#F5B07F"/>
    </marker>
    <style>
      .flow { stroke-dasharray: 4 6; animation: mv 1.4s linear infinite; }
      @keyframes mv { from { stroke-dashoffset: 0 } to { stroke-dashoffset: -20 } }
      .pop { transform-origin: center; transform-box: fill-box; animation: pop 9s ease-in-out infinite; }
      @keyframes pop { 0%,92%,100% { transform: scale(1) } 94%,97% { transform: scale(1.18) } }
    </style>
    <pattern id="ex-dots" width="12" height="12" patternUnits="userSpaceOnUse">
      <circle cx="1.5" cy="1.5" r="0.9" fill="#FCF3D8" fill-opacity="0.08"/>
    </pattern>
  </defs>
  <rect x="0.5" y="0.5" width="599" height="319" rx="16" fill="#0D1117" stroke="#30363D" stroke-width="1"/>
  <rect x="0.5" y="0.5" width="599" height="319" rx="16" fill="url(#ex-dots)"/>
  <text x="30" y="54" font-family="Inter, -apple-system, system-ui, sans-serif" font-size="24" font-weight="900" letter-spacing="-0.01em" fill="#F5B07F">Podcast <tspan fill="#FCF3D8">→</tspan> knowledge graph</text>
  <text x="30" y="80" font-family="Inter, -apple-system, system-ui, sans-serif" font-size="13" font-weight="500" fill="rgba(252,243,216,0.75)">Transcribe · diarize · extract — <tspan fill="#6DFFB0" font-style="italic">resolve entities across episodes.</tspan></text>

  <!-- left: waveform + speaker tags -->
  <g transform="translate(30, 120)">
    <rect width="220" height="140" rx="10" fill="rgba(245,176,127,0.08)"/>
    <text x="12" y="20" font-family="JetBrains Mono, ui-monospace, monospace" font-size="9" letter-spacing="0.18em" font-weight="800" fill="#F5B07F">🎧 AUDIO · WHISPER</text>

    <!-- waveform bars -->
    <g transform="translate(14, 58)" stroke="#F5B07F" stroke-width="2" stroke-linecap="round">
      <line x1="0"   y1="-6"  x2="0"   y2="6"/>
      <line x1="7"   y1="-12" x2="7"   y2="12"/>
      <line x1="14"  y1="-4"  x2="14"  y2="4"/>
      <line x1="21"  y1="-15" x2="21"  y2="15"/>
      <line x1="28"  y1="-9"  x2="28"  y2="9"/>
      <line x1="35"  y1="-18" x2="35"  y2="18"/>
      <line x1="42"  y1="-7"  x2="42"  y2="7"/>
      <line x1="49"  y1="-13" x2="49"  y2="13"/>
      <line x1="56"  y1="-5"  x2="56"  y2="5"/>
      <line x1="63"  y1="-16" x2="63"  y2="16"/>
      <line x1="70"  y1="-8"  x2="70"  y2="8"/>
      <line x1="77"  y1="-11" x2="77"  y2="11"/>
      <line x1="84"  y1="-4"  x2="84"  y2="4"/>
      <line x1="91"  y1="-15" x2="91"  y2="15"/>
      <line x1="98"  y1="-9"  x2="98"  y2="9"/>
      <line x1="105" y1="-6"  x2="105" y2="6"/>
      <line x1="112" y1="-13" x2="112" y2="13"/>
      <line x1="119" y1="-7"  x2="119" y2="7"/>
      <line x1="126" y1="-14" x2="126" y2="14"/>
      <line x1="133" y1="-5"  x2="133" y2="5"/>
      <line x1="140" y1="-10" x2="140" y2="10"/>
      <line x1="147" y1="-12" x2="147" y2="12"/>
      <line x1="154" y1="-6"  x2="154" y2="6"/>
      <line x1="161" y1="-15" x2="161" y2="15"/>
      <line x1="168" y1="-8"  x2="168" y2="8"/>
      <line x1="175" y1="-4"  x2="175" y2="4"/>
      <line x1="182" y1="-11" x2="182" y2="11"/>
      <line x1="189" y1="-7"  x2="189" y2="7"/>
    </g>

    <!-- speaker tags -->
    <g font-family="JetBrains Mono, ui-monospace, monospace" font-size="9" font-weight="800">
      <g transform="translate(14, 92)">
        <rect width="36" height="16" rx="8" fill="#FF8A9B"/>
        <text x="18" y="8" text-anchor="middle" dominant-baseline="central" fill="#4A0E1A">S1</text>
      </g>
      <g transform="translate(58, 92)">
        <rect width="36" height="16" rx="8" fill="#7FD8FF"/>
        <text x="18" y="8" text-anchor="middle" dominant-baseline="central" fill="#0B2540">S2</text>
      </g>
      <g transform="translate(102, 92)">
        <rect width="36" height="16" rx="8" fill="#FFD94A"/>
        <text x="18" y="8" text-anchor="middle" dominant-baseline="central" fill="#3D2D00">S3</text>
      </g>
      <g transform="translate(146, 92)">
        <rect width="36" height="16" rx="8" fill="#6DFFB0"/>
        <text x="18" y="8" text-anchor="middle" dominant-baseline="central" fill="#0D3521">S4</text>
      </g>
    </g>
    <text x="12" y="128" font-family="Inter, -apple-system, system-ui, sans-serif" font-size="10" font-style="italic" fill="rgba(252,243,216,0.6)">4 speakers · 42 min episode</text>
  </g>

  <!-- flow -->
  <path class="flow" d="M258 190 L 298 190" stroke="#F5B07F" stroke-width="1.8" fill="none" stroke-linecap="round" marker-end="url(#pc-arr)"/>
  <text x="278" y="178" text-anchor="middle" font-family="JetBrains Mono, ui-monospace, monospace" font-size="9" letter-spacing="0.14em" font-weight="800" fill="#F5B07F">LLM</text>

  <!-- right: entity-resolution graph across episodes -->
  <g transform="translate(306, 120)">
    <rect width="264" height="140" rx="10" fill="rgba(201,179,255,0.08)"/>
    <text x="14" y="20" font-family="JetBrains Mono, ui-monospace, monospace" font-size="9" letter-spacing="0.18em" font-weight="800" fill="#C9B3FF">GRAPH · RESOLVED</text>

    <g stroke-width="1.4" fill="none" stroke-linecap="round" stroke-opacity="0.55">
      <line x1="60"  y1="62" x2="140" y2="46"  stroke="#FF8A9B"/>
      <line x1="60"  y1="62" x2="140" y2="86"  stroke="#FFD94A"/>
      <line x1="60"  y1="62" x2="210" y2="62"  stroke="#7FD8FF"/>
      <line x1="140" y1="46" x2="210" y2="62"  stroke="#C9B3FF"/>
      <line x1="140" y1="86" x2="210" y2="62"  stroke="#C9B3FF"/>
      <line x1="140" y1="46" x2="140" y2="86"  stroke="rgba(252,243,216,0.22)"/>
    </g>

    <g transform="translate(60, 62)">
      <circle class="pop" r="12" fill="#FF8A9B"/>
      <text x="0" y="0" text-anchor="middle" dominant-baseline="central" font-family="JetBrains Mono, ui-monospace, monospace" font-size="10" font-weight="800" fill="#4A0E1A">S1</text>
    </g>
    <g transform="translate(140, 46)">
      <circle class="pop" r="10" fill="#FFD94A" style="animation-delay:2s"/>
      <text x="0" y="0" text-anchor="middle" dominant-baseline="central" font-family="Inter, -apple-system, system-ui, sans-serif" font-size="11" font-weight="900" fill="#3D2D00">#</text>
    </g>
    <g transform="translate(140, 86)">
      <circle class="pop" r="10" fill="#6DFFB0" style="animation-delay:4s"/>
      <text x="0" y="0" text-anchor="middle" dominant-baseline="central" font-family="Inter, -apple-system, system-ui, sans-serif" font-size="11" font-weight="900" fill="#0D3521">✓</text>
    </g>
    <g transform="translate(210, 62)">
      <circle class="pop" r="12" fill="#C9B3FF" style="animation-delay:1s"/>
      <text x="0" y="0" text-anchor="middle" dominant-baseline="central" font-family="JetBrains Mono, ui-monospace, monospace" font-size="10" font-weight="800" fill="#2A1B4D">ep</text>
    </g>

    <text x="14" y="128" font-family="Inter, -apple-system, system-ui, sans-serif" font-size="10" font-style="italic" fill="rgba(252,243,216,0.6)">resolved across episodes</text>
  </g>

  <g transform="translate(30, 286)" font-family="JetBrains Mono, ui-monospace, monospace" font-size="9" letter-spacing="0.14em" font-weight="700">
    <rect width="68" height="20" rx="10" fill="rgba(255,138,155,0.14)"/>
    <text x="34" y="10" text-anchor="middle" dominant-baseline="central" fill="#FF8A9B">WHISPER</text>
    <g transform="translate(76, 0)"><rect width="64" height="20" rx="10" fill="rgba(245,176,127,0.14)"/><text x="32" y="10" text-anchor="middle" dominant-baseline="central" fill="#F5B07F">YOUTUBE</text></g>
    <g transform="translate(148, 0)"><rect width="80" height="20" rx="10" fill="rgba(201,179,255,0.14)"/><text x="40" y="10" text-anchor="middle" dominant-baseline="central" fill="#C9B3FF">SURREALDB</text></g>
    <g transform="translate(236, 0)"><rect width="54" height="20" rx="10" fill="rgba(127,216,255,0.14)"/><text x="27" y="10" text-anchor="middle" dominant-baseline="central" fill="#7FD8FF">NEO4J</text></g>
    <text x="540" y="10" text-anchor="end" dominant-baseline="central" font-weight="800" fill="rgba(252,243,216,0.75)">GITHUB →</text>
  </g>
</svg>
