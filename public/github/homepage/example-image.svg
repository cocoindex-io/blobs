<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 320 200" role="img" aria-label="Image & video search · CocoIndex example: embed images and video frames with ColPali or CLIP, store the vectors, and retrieve by semantic text query.">
  <title>Image &amp; video search · CocoIndex example</title>
  <desc>Use this example to build semantic search over images or video frames. CocoIndex walks an image/video directory (local, S3, or GCS), samples frames if needed, embeds each image with ColPali, CLIP, or a similar vision encoder, and stores vectors in a vector DB. Retrieval is text-to-image: users type "sunset" and the engine returns the matching frames. Incremental — only newly added or edited media re-embeds. Good fit for asset libraries, video search, product catalog search. Keywords: image search, video search, ColPali, CLIP, vision embeddings, multimodal retrieval, vector DB, semantic search.</desc>
  <defs>
    <style>
      .glow { animation: glow 2.8s ease-in-out infinite; }
      @keyframes glow { 0%,100% { opacity: 0.55; } 50% { opacity: 1; } }
      .beam { animation: beam 2.8s ease-in-out infinite; stroke-dasharray: 4 4; }
      @keyframes beam { from { stroke-dashoffset: 0 } to { stroke-dashoffset: -16 } }
    </style>
  </defs>

  <text x="160" y="34" text-anchor="middle" font-family="Inter, -apple-system, system-ui, sans-serif" font-size="19" font-weight="700" letter-spacing="-0.3" fill="#FCF3D8">Image &amp; video search</text>

  <!-- 3×3 image grid (top-left corner at 40,62) -->
  <g transform="translate(40, 62)">
    <!-- row 0 -->
    <rect x="0"   y="0"   width="36" height="36" rx="4" fill="#F5B07F" opacity="0.55"/>
    <rect x="44"  y="0"   width="36" height="36" rx="4" fill="#FB6A76" opacity="0.55"/>
    <rect x="88"  y="0"   width="36" height="36" rx="4" fill="#86C3CB" opacity="0.55"/>
    <!-- row 1 -->
    <rect x="0"   y="44"  width="36" height="36" rx="4" fill="#C9A0FF" opacity="0.55"/>
    <!-- MATCH tile: a little sun-over-sea scene -->
    <g>
      <rect x="44" y="44" width="36" height="36" rx="4" fill="#FFD94A"/>
      <rect x="44" y="66" width="36" height="14" rx="4" fill="#BE5133"/>
      <circle cx="62" cy="58" r="6" fill="#FCF3D8"/>
      <rect class="glow" x="42" y="42" width="40" height="40" rx="5" fill="none" stroke="#FFD94A" stroke-width="2.6"/>
    </g>
    <rect x="88"  y="44"  width="36" height="36" rx="4" fill="#FB6A76" opacity="0.55"/>
    <!-- row 2 -->
    <rect x="0"   y="88"  width="36" height="36" rx="4" fill="#FB6A76" opacity="0.55"/>
    <rect x="44"  y="88"  width="36" height="36" rx="4" fill="#86C3CB" opacity="0.55"/>
    <rect x="88"  y="88"  width="36" height="36" rx="4" fill="#C9A0FF" opacity="0.55"/>
  </g>

  <!-- query chip on the right -->
  <g transform="translate(194, 78)">
    <rect x="0" y="0" width="108" height="30" rx="15" fill="rgba(252,243,216,0.08)" stroke="#F5B07F" stroke-width="1.6"/>
    <circle cx="16" cy="15" r="5" fill="none" stroke="#F5B07F" stroke-width="2"/>
    <line x1="19" y1="18" x2="24" y2="23" stroke="#F5B07F" stroke-width="2" stroke-linecap="round"/>
    <text x="32" y="20" font-family="JetBrains Mono, ui-monospace, monospace" font-size="12" font-weight="600" fill="#FCF3D8">"sunset"</text>
  </g>

  <!-- beam from query to match tile -->
  <path class="beam" d="M 200 108 Q 172 116 128 116" stroke="#FFD94A" stroke-width="2" fill="none" stroke-linecap="round"/>

  <!-- vector preview under query -->
  <g transform="translate(194, 124)" fill="#F5B07F">
    <circle cx="0"  cy="0"  r="2.4" opacity="0.55"/>
    <circle cx="10" cy="4"  r="2.4"/>
    <circle cx="22" cy="-2" r="2.4" opacity="0.75"/>
    <circle cx="34" cy="4"  r="2.4" opacity="0.9"/>
    <circle cx="46" cy="-2" r="2.4"/>
    <circle cx="58" cy="4"  r="2.4" opacity="0.55"/>
    <circle cx="70" cy="0"  r="2.4" opacity="0.8"/>
    <circle cx="82" cy="4"  r="2.4"/>
    <circle cx="94" cy="-2" r="2.4" opacity="0.6"/>
    <text x="0" y="22" font-family="JetBrains Mono, ui-monospace, monospace" font-size="9" letter-spacing="0.16em" fill="rgba(252,243,216,0.55)">VECTOR EMBED · 1024d</text>
  </g>

  <!-- footer caption -->
  <text x="160" y="188" text-anchor="middle" font-family="JetBrains Mono, ui-monospace, monospace" font-size="11" letter-spacing="0.16em" fill="rgba(252,243,216,0.55)">QUERY · MATCH · RETRIEVE</text>
</svg>
