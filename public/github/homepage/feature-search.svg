<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 200 200" role="img" aria-label="Index and semantic search — find by meaning">
  <defs>
    <style>
      .pulse { animation: p 1.6s ease-in-out infinite; }
      @keyframes p { 0%,100% { opacity: 1 } 50% { opacity: 0.45 } }
    </style>
  </defs>
  <rect width="200" height="200" rx="14" fill="#FCF3D8"/>
  <text x="100" y="32" text-anchor="middle" font-family="Inter, -apple-system, system-ui, sans-serif" font-size="13" font-weight="700" fill="#2A121B">Index &amp; semantic search</text>

  <!-- vector cloud -->
  <g fill="#532638" fill-opacity="0.4">
    <circle cx="46" cy="78" r="3"/>
    <circle cx="68" cy="64" r="3"/>
    <circle cx="92" cy="72" r="3"/>
    <circle cx="120" cy="62" r="3"/>
    <circle cx="148" cy="78" r="3"/>
    <circle cx="40" cy="108" r="3"/>
    <circle cx="62" cy="118" r="3"/>
    <circle cx="148" cy="120" r="3"/>
    <circle cx="58" cy="150" r="3"/>
    <circle cx="90" cy="156" r="3"/>
    <circle cx="120" cy="148" r="3"/>
    <circle cx="150" cy="158" r="3"/>
  </g>

  <!-- magnifying lens, centered -->
  <circle cx="108" cy="108" r="32" fill="rgba(252,243,216,0.7)" stroke="#532638" stroke-width="3"/>
  <circle class="pulse" cx="108" cy="108" r="8" fill="#BE5133"/>
  <line x1="132" y1="132" x2="160" y2="160" stroke="#532638" stroke-width="5" stroke-linecap="round"/>
  <line x1="132" y1="132" x2="160" y2="160" stroke="#BE5133" stroke-width="2" stroke-linecap="round"/>

  <text x="100" y="186" text-anchor="middle" font-family="Inter, -apple-system, system-ui, sans-serif" font-size="11" fill="#532638">Find by meaning, not grep.</text>
</svg>
