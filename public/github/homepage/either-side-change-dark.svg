<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 1200 600" role="img" aria-label="What happens when either side changes — CocoIndex tracks per-row provenance so the Δ propagates at minimum cost. Two scenarios shown in one illustration: (top) Source change — a single file (b.md) is edited and only one target dot re-syncs. (bottom) Code change — the transformation function F is rewritten from v1 to v2, and only the dots whose outputs depend on the changed code re-run. Source on the left, F (coco mascot with Python code) in the center, Target dots-matrix on the right. Palette: source sky-blue, target mint-green, Δ coral highlight. Keywords: incremental indexing, change data capture, delta processing, fine-grained invalidation, code-aware caching, hash-of-code invalidation, memoization, reproducible pipelines, incremental recomputation.">
  <title>What happens when either side changes</title>
  <desc>Two-scenario diagram: top row shows a source file edit causing one target dot to re-sync; bottom row shows a code edit (F v1 → v2) causing only dependent dots to re-run. Source on the left (sky), F in center (peach code-block held by the coco mascot), target dots-matrix on the right (mint) with the affected dots highlighted in coral.</desc>

  <defs>
    <marker id="esc-arr-s" viewBox="0 0 10 10" refX="9" refY="5" markerWidth="7" markerHeight="7" orient="auto">
      <path d="M0 0 L10 5 L0 10 z" fill="#FF8A9B"/>
    </marker>
    <marker id="esc-arr-y" viewBox="0 0 10 10" refX="9" refY="5" markerWidth="7" markerHeight="7" orient="auto">
      <path d="M0 0 L10 5 L0 10 z" fill="#FFD94A"/>
    </marker>

    <radialGradient id="esc-glow" cx="50%" cy="50%" r="55%">
      <stop offset="0%"   stop-color="#6DFFB0" stop-opacity="0.38"/>
      <stop offset="65%"  stop-color="#6DFFB0" stop-opacity="0.04"/>
      <stop offset="100%" stop-color="#6DFFB0" stop-opacity="0"/>
    </radialGradient>

    <style>
      .flow { stroke-dasharray: 5 7; animation: mv 1.4s linear infinite; }
      @keyframes mv { from { stroke-dashoffset: 0 } to { stroke-dashoffset: -24 } }
      .pulse { animation: p 2.2s ease-in-out infinite; transform-origin: center; transform-box: fill-box; }
      @keyframes p { 0%,100% { opacity: 1; transform: scale(1) } 50% { opacity: 0.45; transform: scale(1.2) } }
      .coco-eye { transform-box: fill-box; transform-origin: center; animation: blink 4.5s ease-in-out infinite; }
      @keyframes blink { 0%,40%,44%,100% { transform: scaleY(1) } 42% { transform: scaleY(0.08) } }
    </style>
  </defs>

  <!-- ===================== TITLE ===================== -->
  <text x="600" y="46" text-anchor="middle" font-family="Inter, -apple-system, system-ui, sans-serif" font-size="28" font-weight="900" letter-spacing="-0.02em" fill="#FCF3D8">
    What happens when either side changes
  </text>
  <text x="600" y="74" text-anchor="middle" font-family="JetBrains Mono, ui-monospace, monospace" font-size="11" letter-spacing="0.22em" font-weight="700" fill="rgba(252,243,216,0.55)">
    PER-ROW PROVENANCE · Δ ONLY · MINIMUM COST
  </text>

  <!-- ====================================================================== -->
  <!-- SCENARIO A : SOURCE CHANGE → ONE DOT RE-SYNCS -->
  <!-- ====================================================================== -->

  <!-- banner label + heading, centered as a unit -->
  <g transform="translate(308, 110)">
    <rect x="0" y="0" width="230" height="24" rx="12" fill="rgba(127,216,255,0.14)"/>
    <text x="115" y="12" text-anchor="middle" dominant-baseline="central" font-family="JetBrains Mono, ui-monospace, monospace" font-size="10" letter-spacing="0.2em" font-weight="800" fill="#7FD8FF">▸ SOURCE CHANGED</text>
  </g>
  <text x="552" y="127" font-family="Inter, -apple-system, system-ui, sans-serif" font-size="16" font-weight="700" fill="#FCF3D8">
    One file is edited · <tspan fill="#6DFFB0" font-style="italic">only one dot re-syncs.</tspan>
  </text>

  <!-- LEFT: SOURCE (sky) -->
  <g transform="translate(60, 154)">
    <rect width="300" height="156" rx="14" fill="rgba(127,216,255,0.08)"/>
    <text x="20" y="24" font-family="JetBrains Mono, ui-monospace, monospace" font-size="10" letter-spacing="0.22em" font-weight="800" fill="#7FD8FF">SOURCE · FILES</text>

    <g font-family="JetBrains Mono, ui-monospace, monospace" font-size="12" fill="#FCF3D8">
      <!-- a.py (unchanged) -->
      <g transform="translate(20,44)">
        <rect width="14" height="14" rx="2" fill="#7FD8FF"/>
        <text x="4" y="11" font-size="8" font-weight="800" fill="#0B2540">py</text>
        <text x="22" y="11">a.py</text>
        <text x="232" y="11" fill="rgba(252,243,216,0.4)" font-size="9">unchanged</text>
      </g>
      <!-- b.md (edited — coral highlight) -->
      <g transform="translate(20,68)">
        <rect width="280" height="20" y="-6" rx="4" fill="#FF8A9B" fill-opacity="0.14"/>
        <rect width="14" height="14" rx="2" fill="#FFD94A"/>
        <text x="3" y="11" font-size="8" font-weight="800" fill="#3D2D00">md</text>
        <text x="22" y="11" font-weight="800" fill="#FF8A9B">b.md</text>
        <text class="pulse" x="268" y="11" font-weight="800" fill="#FF8A9B">Δ</text>
      </g>
      <!-- c.pdf (unchanged) -->
      <g transform="translate(20,94)">
        <rect width="14" height="14" rx="2" fill="#FF8A9B"/>
        <text x="2" y="11" font-size="8" font-weight="800" fill="#4A0E1A">pdf</text>
        <text x="22" y="11">c.pdf</text>
        <text x="232" y="11" fill="rgba(252,243,216,0.4)" font-size="9">unchanged</text>
      </g>
      <!-- d.ts (unchanged) -->
      <g transform="translate(20,118)">
        <rect width="14" height="14" rx="2" fill="#C9B3FF"/>
        <text x="3" y="11" font-size="8" font-weight="800" fill="#2A1B4D">ts</text>
        <text x="22" y="11">d.ts</text>
        <text x="232" y="11" fill="rgba(252,243,216,0.4)" font-size="9">unchanged</text>
      </g>
    </g>
  </g>

  <!-- ARROW 1A: source edit → F (coral, to emphasise only-one-file) -->
  <path class="flow" d="M370 232 L 478 232" stroke="#FF8A9B" stroke-width="2" fill="none" stroke-linecap="round" marker-end="url(#esc-arr-s)"/>
  <text x="424" y="218" text-anchor="middle" font-family="JetBrains Mono, ui-monospace, monospace" font-size="12" font-weight="800" fill="#FF8A9B">Δ 1 file</text>

  <!-- CENTER F: mini code block (same F as before, unchanged) -->
  <g transform="translate(490, 184)">
    <rect width="220" height="100" rx="10" fill="#1E0F18" stroke="rgba(252,243,216,0.18)" stroke-width="1"/>
    <rect width="220" height="18" rx="10" fill="rgba(252,243,216,0.05)"/>
    <rect y="9" width="220" height="9" fill="rgba(252,243,216,0.05)"/>
    <circle cx="10" cy="9" r="2.8" fill="#FF8A9B"/>
    <circle cx="20" cy="9" r="2.8" fill="#FFD94A"/>
    <circle cx="30" cy="9" r="2.8" fill="#6DFFB0"/>
    <text x="110" y="9" text-anchor="middle" dominant-baseline="central" font-family="JetBrains Mono, ui-monospace, monospace" font-size="8" letter-spacing="0.12em" font-weight="600" fill="rgba(252,243,216,0.5)">F · v1 (unchanged)</text>
    <g font-family="JetBrains Mono, ui-monospace, monospace" font-size="11" fill="#FCF3D8">
      <text x="12" y="40"><tspan fill="#F5B07F">@coco.fn</tspan></text>
      <text x="12" y="58"><tspan fill="#C9B3FF">async def</tspan> <tspan fill="#FFD94A">f</tspan>(src):</text>
      <text x="26" y="76"><tspan fill="#6DFFB0">target</tspan>.row(src)</text>
    </g>
  </g>

  <!-- ARROW 2A: F → target (coral, single-dot pulse) -->
  <path class="flow" d="M720 232 L 828 232" stroke="#FF8A9B" stroke-width="2" fill="none" stroke-linecap="round" marker-end="url(#esc-arr-s)"/>
  <text x="774" y="218" text-anchor="middle" font-family="JetBrains Mono, ui-monospace, monospace" font-size="12" font-weight="800" fill="#FF8A9B">1 dot</text>

  <!-- RIGHT: TARGET dots matrix (mint) — one dot highlighted coral -->
  <g transform="translate(840, 154)">
    <rect width="300" height="156" rx="14" fill="rgba(109,255,176,0.08)"/>
    <text x="20" y="24" font-family="JetBrains Mono, ui-monospace, monospace" font-size="10" letter-spacing="0.22em" font-weight="800" fill="#6DFFB0">TARGET · INDEX</text>

    <!-- 7×4 matrix; one dot highlighted coral with pulse -->
    <g>
      <!-- row 0 -->
      <circle cx="36"  cy="52"  r="4.5" fill="#7FD8FF"/>
      <circle cx="76"  cy="52"  r="4.5" fill="#7FD8FF"/>
      <circle cx="116" cy="52"  r="4.5" fill="#FFD94A"/>
      <circle cx="156" cy="52"  r="4.5" fill="#FF8A9B"/>
      <circle cx="196" cy="52"  r="4.5" fill="#C9B3FF"/>
      <circle cx="236" cy="52"  r="4.5" fill="#7FD8FF"/>
      <circle cx="276" cy="52"  r="4.5" fill="#FFD94A"/>
      <!-- row 1 -->
      <circle cx="36"  cy="76"  r="4.5" fill="#FFD94A"/>
      <circle cx="76"  cy="76"  r="4.5" fill="#FF8A9B"/>
      <!-- THE single coral-pulse highlight dot — the one that re-syncs -->
      <circle class="pulse" cx="116" cy="76" r="7" fill="#FF8A9B"/>
      <circle cx="156" cy="76"  r="4.5" fill="#7FD8FF"/>
      <circle cx="196" cy="76"  r="4.5" fill="#FFD94A"/>
      <circle cx="236" cy="76"  r="4.5" fill="#7FD8FF"/>
      <circle cx="276" cy="76"  r="4.5" fill="#FF8A9B"/>
      <!-- row 2 -->
      <circle cx="36"  cy="100" r="4.5" fill="#7FD8FF"/>
      <circle cx="76"  cy="100" r="4.5" fill="#FFD94A"/>
      <circle cx="116" cy="100" r="4.5" fill="#FF8A9B"/>
      <circle cx="156" cy="100" r="4.5" fill="#C9B3FF"/>
      <circle cx="196" cy="100" r="4.5" fill="#7FD8FF"/>
      <circle cx="236" cy="100" r="4.5" fill="#FFD94A"/>
      <circle cx="276" cy="100" r="4.5" fill="#7FD8FF"/>
      <!-- row 3 -->
      <circle cx="36"  cy="124" r="4.5" fill="#FFD94A"/>
      <circle cx="76"  cy="124" r="4.5" fill="#7FD8FF"/>
      <circle cx="116" cy="124" r="4.5" fill="#7FD8FF"/>
      <circle cx="156" cy="124" r="4.5" fill="#C9B3FF"/>
      <circle cx="196" cy="124" r="4.5" fill="#FF8A9B"/>
      <circle cx="236" cy="124" r="4.5" fill="#FFD94A"/>
      <circle cx="276" cy="124" r="4.5" fill="#FF8A9B"/>
    </g>
  </g>

  <!-- ====================================================================== -->
  <!-- DIVIDER -->
  <!-- ====================================================================== -->
  <line x1="80" y1="346" x2="1120" y2="346" stroke="#FCF3D8" stroke-opacity="0.1" stroke-width="1"/>

  <!-- ====================================================================== -->
  <!-- SCENARIO B : CODE CHANGE → AFFECTED DOTS RE-RUN -->
  <!-- ====================================================================== -->

  <!-- banner label + heading, centered as a unit -->
  <g transform="translate(278, 376)">
    <rect x="0" y="0" width="230" height="24" rx="12" fill="rgba(255,217,74,0.14)"/>
    <text x="115" y="12" text-anchor="middle" dominant-baseline="central" font-family="JetBrains Mono, ui-monospace, monospace" font-size="10" letter-spacing="0.2em" font-weight="800" fill="#FFD94A">▸ CODE CHANGED</text>
  </g>
  <text x="522" y="393" font-family="Inter, -apple-system, system-ui, sans-serif" font-size="16" font-weight="700" fill="#FCF3D8">
    F is rewritten v1 → v2 · <tspan fill="#6DFFB0" font-style="italic">only affected dots re-run.</tspan>
  </text>

  <!-- LEFT: SOURCE (sky) — all files unchanged -->
  <g transform="translate(60, 420)">
    <rect width="300" height="156" rx="14" fill="rgba(127,216,255,0.08)"/>
    <text x="20" y="24" font-family="JetBrains Mono, ui-monospace, monospace" font-size="10" letter-spacing="0.22em" font-weight="800" fill="#7FD8FF">SOURCE · FILES</text>

    <g font-family="JetBrains Mono, ui-monospace, monospace" font-size="12" fill="#FCF3D8">
      <g transform="translate(20,44)">
        <rect width="14" height="14" rx="2" fill="#7FD8FF"/>
        <text x="4" y="11" font-size="8" font-weight="800" fill="#0B2540">py</text>
        <text x="22" y="11">a.py</text>
        <text x="232" y="11" fill="rgba(252,243,216,0.4)" font-size="9">unchanged</text>
      </g>
      <g transform="translate(20,68)">
        <rect width="14" height="14" rx="2" fill="#FFD94A"/>
        <text x="3" y="11" font-size="8" font-weight="800" fill="#3D2D00">md</text>
        <text x="22" y="11">b.md</text>
        <text x="232" y="11" fill="rgba(252,243,216,0.4)" font-size="9">unchanged</text>
      </g>
      <g transform="translate(20,94)">
        <rect width="14" height="14" rx="2" fill="#FF8A9B"/>
        <text x="2" y="11" font-size="8" font-weight="800" fill="#4A0E1A">pdf</text>
        <text x="22" y="11">c.pdf</text>
        <text x="232" y="11" fill="rgba(252,243,216,0.4)" font-size="9">unchanged</text>
      </g>
      <g transform="translate(20,118)">
        <rect width="14" height="14" rx="2" fill="#C9B3FF"/>
        <text x="3" y="11" font-size="8" font-weight="800" fill="#2A1B4D">ts</text>
        <text x="22" y="11">d.ts</text>
        <text x="232" y="11" fill="rgba(252,243,216,0.4)" font-size="9">unchanged</text>
      </g>
    </g>
  </g>

  <!-- ARROW 1B: source → F (cream/dim because source didn't drive this one) -->
  <path d="M370 498 L 478 498" stroke="rgba(252,243,216,0.28)" stroke-width="1.4" fill="none" stroke-linecap="round" stroke-dasharray="3 5"/>

  <!-- CENTER F: code block showing the v1→v2 rewrite -->
  <g transform="translate(490, 450)">
    <rect width="220" height="100" rx="10" fill="#1E0F18" stroke="#FFD94A" stroke-opacity="0.6" stroke-width="1.4"/>
    <rect width="220" height="18" rx="10" fill="rgba(255,217,74,0.1)"/>
    <rect y="9" width="220" height="9" fill="rgba(255,217,74,0.1)"/>
    <circle cx="10" cy="9" r="2.8" fill="#FF8A9B"/>
    <circle cx="20" cy="9" r="2.8" fill="#FFD94A"/>
    <circle cx="30" cy="9" r="2.8" fill="#6DFFB0"/>
    <text x="110" y="9" text-anchor="middle" dominant-baseline="central" font-family="JetBrains Mono, ui-monospace, monospace" font-size="8" letter-spacing="0.12em" font-weight="800" fill="#FFD94A">F · v1 → v2</text>
    <g font-family="JetBrains Mono, ui-monospace, monospace" font-size="11" fill="#FCF3D8">
      <text x="12" y="40"><tspan fill="#F5B07F">@coco.fn</tspan></text>
      <text x="12" y="58"><tspan fill="#C9B3FF">async def</tspan> <tspan fill="#FFD94A">f</tspan>(src):</text>
      <text x="26" y="76"><tspan fill="#6DFFB0">target</tspan>.row(<tspan fill="#FFD94A" font-weight="800">v2</tspan>(src))</text>
    </g>
    <!-- edit pulse on the right edge -->
    <circle class="pulse" cx="214" cy="50" r="4.5" fill="#FFD94A"/>
  </g>

  <!-- ARROW 2B: F → target (yellow, multiple dots) -->
  <path class="flow" d="M720 498 L 828 498" stroke="#FFD94A" stroke-width="2" fill="none" stroke-linecap="round" marker-end="url(#esc-arr-y)"/>
  <text x="774" y="484" text-anchor="middle" font-family="JetBrains Mono, ui-monospace, monospace" font-size="12" font-weight="800" fill="#FFD94A">affected dots</text>

  <!-- RIGHT: TARGET matrix — multiple dots highlighted yellow (those whose outputs depend on code) -->
  <g transform="translate(840, 420)">
    <rect width="300" height="156" rx="14" fill="rgba(109,255,176,0.08)"/>
    <text x="20" y="24" font-family="JetBrains Mono, ui-monospace, monospace" font-size="10" letter-spacing="0.22em" font-weight="800" fill="#6DFFB0">TARGET · INDEX</text>

    <g>
      <!-- row 0 : 3 dots affected (yellow pulse) -->
      <circle class="pulse" cx="36"  cy="52"  r="7" fill="#FFD94A"/>
      <circle cx="76"  cy="52"  r="4.5" fill="#7FD8FF"/>
      <circle class="pulse" cx="116" cy="52"  r="7" fill="#FFD94A" style="animation-delay:0.3s"/>
      <circle cx="156" cy="52"  r="4.5" fill="#FF8A9B"/>
      <circle cx="196" cy="52"  r="4.5" fill="#C9B3FF"/>
      <circle class="pulse" cx="236" cy="52"  r="7" fill="#FFD94A" style="animation-delay:0.6s"/>
      <circle cx="276" cy="52"  r="4.5" fill="#FFD94A"/>
      <!-- row 1 : 2 dots affected -->
      <circle cx="36"  cy="76"  r="4.5" fill="#FFD94A"/>
      <circle class="pulse" cx="76"  cy="76"  r="7" fill="#FFD94A" style="animation-delay:0.9s"/>
      <circle cx="116" cy="76"  r="4.5" fill="#FF8A9B"/>
      <circle cx="156" cy="76"  r="4.5" fill="#7FD8FF"/>
      <circle class="pulse" cx="196" cy="76"  r="7" fill="#FFD94A" style="animation-delay:1.2s"/>
      <circle cx="236" cy="76"  r="4.5" fill="#7FD8FF"/>
      <circle cx="276" cy="76"  r="4.5" fill="#FF8A9B"/>
      <!-- row 2 : 3 dots affected -->
      <circle class="pulse" cx="36"  cy="100" r="7" fill="#FFD94A" style="animation-delay:0.2s"/>
      <circle cx="76"  cy="100" r="4.5" fill="#FFD94A"/>
      <circle cx="116" cy="100" r="4.5" fill="#FF8A9B"/>
      <circle class="pulse" cx="156" cy="100" r="7" fill="#FFD94A" style="animation-delay:1.5s"/>
      <circle cx="196" cy="100" r="4.5" fill="#7FD8FF"/>
      <circle cx="236" cy="100" r="4.5" fill="#FFD94A"/>
      <circle class="pulse" cx="276" cy="100" r="7" fill="#FFD94A" style="animation-delay:1.8s"/>
      <!-- row 3 : 2 dots affected -->
      <circle cx="36"  cy="124" r="4.5" fill="#FFD94A"/>
      <circle class="pulse" cx="76"  cy="124" r="7" fill="#FFD94A" style="animation-delay:0.5s"/>
      <circle cx="116" cy="124" r="4.5" fill="#7FD8FF"/>
      <circle cx="156" cy="124" r="4.5" fill="#C9B3FF"/>
      <circle cx="196" cy="124" r="4.5" fill="#FF8A9B"/>
      <circle class="pulse" cx="236" cy="124" r="7" fill="#FFD94A" style="animation-delay:1.1s"/>
      <circle cx="276" cy="124" r="4.5" fill="#FF8A9B"/>
    </g>
  </g>

  <!-- ===================== FOOTER TAKE-AWAY ===================== -->
  <text x="600" y="586" text-anchor="middle" font-family="Inter, -apple-system, system-ui, sans-serif" font-size="13" font-style="italic" fill="rgba(252,243,216,0.65)">
    Either side changes — only the Δ is reprocessed, always at minimum cost.
  </text>
</svg>
