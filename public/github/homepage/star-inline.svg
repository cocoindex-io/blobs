<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 24 24" role="img" aria-label="Star">
  <title>Star</title>
  <defs>
    <style>
      .pulse {
        animation: pulse 2.2s ease-in-out infinite;
        transform-origin: 12px 12px;
        transform-box: fill-box;
      }
      @keyframes pulse {
        0%, 100% { transform: scale(1);    }
        50%      { transform: scale(1.15); }
      }
      .twinkle {
        animation: tw 1.8s ease-in-out infinite;
        transform-origin: center;
        transform-box: fill-box;
      }
      .tw2 { animation-delay: 0.6s; }
      @keyframes tw {
        0%, 100% { opacity: 0; transform: scale(0.6); }
        50%      { opacity: 1; transform: scale(1);   }
      }
    </style>
  </defs>

  <!-- main star (gold, gently pulsing) -->
  <path class="pulse"
        d="M12 2.5 L14.6 9 L21.5 9.4 L16.2 13.7 L17.9 20.5 L12 17 L6.1 20.5 L7.8 13.7 L2.5 9.4 L9.4 9 Z"
        fill="#FFD94A"/>

  <!-- two little twinkle sparkles off to the side -->
  <polygon class="twinkle"     points="21,4 21.8,6 24,6.8 21.8,7.6 21,10 20.2,7.6 18,6.8 20.2,6" fill="#FFD94A" opacity="0.85"/>
  <polygon class="twinkle tw2" points="3,18 3.6,19.4 5,20 3.6,20.6 3,22 2.4,20.6 1,20 2.4,19.4"   fill="#FFD94A" opacity="0.85"/>
</svg>
