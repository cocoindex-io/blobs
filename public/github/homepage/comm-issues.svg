<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 260 100" role="img" aria-label="Issues">
  <title>Issues</title>
  <desc>Open an issue on the CocoIndex GitHub repository.</desc>

  <!-- issue dot / bullseye -->
  <g transform="translate(40, 50)">
    <circle cx="0" cy="0" r="28" fill="none" stroke="#FF8FA3" stroke-width="4"/>
    <circle cx="0" cy="0" r="10" fill="#FF8FA3"/>
  </g>

  <text x="98" y="64"
        font-family="Inter, -apple-system, system-ui, sans-serif"
        font-size="34" font-weight="700" letter-spacing="-0.5" fill="#FF8FA3">
    Issues
  </text>
</svg>
