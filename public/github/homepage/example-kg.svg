<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 600 320" role="img" aria-label="Conversation → knowledge graph — LLM extracts people, topics, decisions, and action items from transcripts and upserts into Neo4j / Kuzu. Live graph, incremental. Keywords: knowledge graph, entity extraction, meeting intelligence, agent memory.">
  <title>Conversation → knowledge graph</title>
  <desc>Transcript turns flowing into a colourful knowledge graph of people, topics, decisions, actions; CocoIndex example; Neo4j / Kuzu targets; palette mint.</desc>
  <defs>
    <linearGradient id="kg-t" x1="0" y1="0" x2="1" y2="0">
      <stop offset="0%" stop-color="#6DFFB0"/>
      <stop offset="100%" stop-color="#7FD8FF"/>
    </linearGradient>
    <marker id="kg-arr" viewBox="0 0 10 10" refX="9" refY="5" markerWidth="7" markerHeight="7" orient="auto">
      <path d="M0 0 L10 5 L0 10 z" fill="#6DFFB0"/>
    </marker>
    <style>
      .flow { stroke-dasharray: 4 6; animation: mv 1.4s linear infinite; }
      @keyframes mv { from { stroke-dashoffset: 0 } to { stroke-dashoffset: -20 } }
      .pop { transform-origin: center; transform-box: fill-box; animation: pop 9s ease-in-out infinite; }
      @keyframes pop { 0%,92%,100% { transform: scale(1) } 94%,97% { transform: scale(1.18) } }
    </style>
    <pattern id="ex-dots" width="12" height="12" patternUnits="userSpaceOnUse">
      <circle cx="1.5" cy="1.5" r="0.9" fill="#FCF3D8" fill-opacity="0.08"/>
    </pattern>
  </defs>
  <rect x="0.5" y="0.5" width="599" height="319" rx="16" fill="#0D1117" stroke="#30363D" stroke-width="1"/>
  <rect x="0.5" y="0.5" width="599" height="319" rx="16" fill="url(#ex-dots)"/>
  <text x="30" y="54" font-family="Inter, -apple-system, system-ui, sans-serif" font-size="24" font-weight="900" letter-spacing="-0.01em" fill="#6DFFB0">Conversation <tspan fill="#FCF3D8">→</tspan> knowledge graph</text>
  <text x="30" y="80" font-family="Inter, -apple-system, system-ui, sans-serif" font-size="13" font-weight="500" fill="rgba(252,243,216,0.75)">LLM extracts people · topics · decisions · actions — <tspan fill="#6DFFB0" font-style="italic">live graph.</tspan></text>

  <!-- transcript turns (left) -->
  <g transform="translate(30, 120)" font-family="JetBrains Mono, ui-monospace, monospace" font-size="10">
    <rect width="170" height="140" rx="10" fill="rgba(252,243,216,0.05)"/>
    <text x="12" y="20" font-family="JetBrains Mono, ui-monospace, monospace" font-size="9" letter-spacing="0.18em" font-weight="800" fill="#FFD94A">📝 TRANSCRIPT</text>
    <g fill="#FCF3D8">
      <text x="12" y="44"><tspan fill="#FF8A9B" font-weight="800">alice:</tspan> ship Q3</text>
      <text x="12" y="62"><tspan fill="#FF8A9B" font-weight="800">bob:</tspan> review #launch</text>
      <text x="12" y="80"><tspan fill="#FF8A9B" font-weight="800">alice:</tspan> draft PRD</text>
      <text x="12" y="98"><tspan fill="#FF8A9B" font-weight="800">eve:</tspan> hire 2 eng</text>
      <text x="12" y="116" fill="rgba(252,243,216,0.45)">…</text>
    </g>
  </g>

  <!-- flow arrow -->
  <path class="flow" d="M208 192 L 242 192" stroke="#6DFFB0" stroke-width="1.8" fill="none" stroke-linecap="round" marker-end="url(#kg-arr)"/>
  <text x="225" y="180" text-anchor="middle" font-family="JetBrains Mono, ui-monospace, monospace" font-size="9" letter-spacing="0.14em" font-weight="800" fill="#6DFFB0">LLM</text>

  <!-- knowledge graph (right) -->
  <g transform="translate(260, 120)">
    <rect width="310" height="140" rx="10" fill="rgba(109,255,176,0.08)"/>
    <text x="14" y="20" font-family="JetBrains Mono, ui-monospace, monospace" font-size="9" letter-spacing="0.18em" font-weight="800" fill="#6DFFB0">KNOWLEDGE GRAPH</text>

    <!-- edges -->
    <g stroke-width="1.4" fill="none" stroke-linecap="round" stroke-opacity="0.6">
      <line x1="150" y1="78" x2="78"  y2="48" stroke="#FF8A9B"/>
      <line x1="150" y1="78" x2="220" y2="48" stroke="#FF8A9B"/>
      <line x1="150" y1="78" x2="78"  y2="112" stroke="#7FD8FF"/>
      <line x1="150" y1="78" x2="222" y2="112" stroke="#FFD94A"/>
      <line x1="150" y1="78" x2="264" y2="78"  stroke="#6DFFB0"/>
      <line x1="78"  y1="48" x2="220" y2="48"  stroke="rgba(252,243,216,0.25)"/>
      <line x1="220" y1="48" x2="264" y2="78"  stroke="rgba(252,243,216,0.22)"/>
    </g>

    <!-- central meet hub -->
    <g transform="translate(150, 78)">
      <circle r="14" fill="#FCF3D8"/>
      <text x="0" y="0" text-anchor="middle" dominant-baseline="central" font-family="Inter, -apple-system, system-ui, sans-serif" font-size="10" font-weight="800" fill="#1E0F18">meet</text>
    </g>
    <!-- alice (coral) -->
    <g transform="translate(78, 48)">
      <circle class="pop" r="10" fill="#FF8A9B"/>
      <text x="0" y="0" text-anchor="middle" dominant-baseline="central" font-family="JetBrains Mono, ui-monospace, monospace" font-size="9" font-weight="800" fill="#4A0E1A">A</text>
    </g>
    <!-- bob -->
    <g transform="translate(220, 48)">
      <circle class="pop" r="10" fill="#FF8A9B" style="animation-delay:2s"/>
      <text x="0" y="0" text-anchor="middle" dominant-baseline="central" font-family="JetBrains Mono, ui-monospace, monospace" font-size="9" font-weight="800" fill="#4A0E1A">B</text>
    </g>
    <!-- launch (topic) -->
    <g transform="translate(264, 78)">
      <circle class="pop" r="10" fill="#FFD94A" style="animation-delay:4s"/>
      <text x="0" y="0" text-anchor="middle" dominant-baseline="central" font-family="Inter, -apple-system, system-ui, sans-serif" font-size="11" font-weight="900" fill="#3D2D00">#</text>
    </g>
    <!-- ship Q3 (decision, mint) -->
    <g transform="translate(222, 112)">
      <circle class="pop" r="10" fill="#6DFFB0" style="animation-delay:1s"/>
      <text x="0" y="0" text-anchor="middle" dominant-baseline="central" font-family="Inter, -apple-system, system-ui, sans-serif" font-size="11" font-weight="900" fill="#0D3521">✓</text>
    </g>
    <!-- draft PRD (action, sky) -->
    <g transform="translate(78, 112)">
      <circle class="pop" r="10" fill="#7FD8FF" style="animation-delay:3s"/>
      <text x="0" y="0" text-anchor="middle" dominant-baseline="central" font-family="Inter, -apple-system, system-ui, sans-serif" font-size="11" font-weight="900" fill="#0B2540">→</text>
    </g>
  </g>

  <g transform="translate(30, 286)" font-family="JetBrains Mono, ui-monospace, monospace" font-size="9" letter-spacing="0.14em" font-weight="700">
    <rect width="56" height="20" rx="10" fill="rgba(255,138,155,0.14)"/>
    <text x="28" y="10" text-anchor="middle" dominant-baseline="central" fill="#FF8A9B">PEOPLE</text>
    <g transform="translate(64, 0)"><rect width="60" height="20" rx="10" fill="rgba(255,217,74,0.14)"/><text x="30" y="10" text-anchor="middle" dominant-baseline="central" fill="#FFD94A">TOPICS</text></g>
    <g transform="translate(132, 0)"><rect width="82" height="20" rx="10" fill="rgba(109,255,176,0.14)"/><text x="41" y="10" text-anchor="middle" dominant-baseline="central" fill="#6DFFB0">DECISIONS</text></g>
    <g transform="translate(222, 0)"><rect width="56" height="20" rx="10" fill="rgba(127,216,255,0.14)"/><text x="28" y="10" text-anchor="middle" dominant-baseline="central" fill="#7FD8FF">NEO4J</text></g>
    <g transform="translate(286, 0)"><rect width="50" height="20" rx="10" fill="rgba(201,179,255,0.14)"/><text x="25" y="10" text-anchor="middle" dominant-baseline="central" fill="#C9B3FF">KUZU</text></g>
    <text x="540" y="10" text-anchor="end" dominant-baseline="central" font-weight="800" fill="rgba(252,243,216,0.75)">GITHUB →</text>
  </g>
</svg>
