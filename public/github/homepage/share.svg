<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 600 180" role="img" aria-label="Share what you build with the CocoIndex community">
  <title>Share what you build</title>
  <defs>
    <style>
      .float { animation: f 3s ease-in-out infinite; }
      @keyframes f { 0%,100% { transform: translateY(0); } 50% { transform: translateY(-6px); } }
      .pulse { animation: p 2s ease-in-out infinite; transform-origin: center; transform-box: fill-box; }
      @keyframes p { 0%,100% { opacity: 0.8; transform: scale(1); } 50% { opacity: 1; transform: scale(1.08); } }
    </style>
  </defs>

  <!-- giant megaphone -->
  <g transform="translate(120, 80)">
    <g class="float">
      <!-- cone -->
      <path d="M-40 -30 L 40 -50 L 40 50 L -40 30 Z" fill="#BE5133"/>
      <!-- cone inner -->
      <path d="M-30 -20 L 30 -36 L 30 36 L -30 20 Z" fill="#E59A63"/>
      <!-- handle -->
      <rect x="-62" y="-8" width="22" height="16" rx="4" fill="#532638"/>
    </g>
    <!-- sound waves -->
    <g class="pulse" stroke="#F5B07F" stroke-width="3" fill="none" stroke-linecap="round">
      <path d="M 56 -20 Q 74 0 56 20"/>
      <path d="M 74 -34 Q 102 0 74 34" style="animation-delay:0.3s"/>
      <path d="M 92 -48 Q 130 0 92 48" style="animation-delay:0.6s"/>
    </g>
  </g>

  <!-- little cocos cheering -->
  <g transform="translate(340, 120)">
    <g class="float">
      <ellipse cx="0" cy="0" rx="28" ry="30" fill="#BE5133"/>
      <ellipse cx="0" cy="2" rx="22" ry="24" fill="#E59A63"/>
      <circle cx="-7" cy="-2" r="4.5" fill="#401D30"/>
      <circle cx="7" cy="-2" r="4.5" fill="#401D30"/>
      <circle cx="-8" cy="-4" r="1.2" fill="#FCF3D8"/>
      <circle cx="6" cy="-4" r="1.2" fill="#FCF3D8"/>
      <ellipse cx="-13" cy="8" rx="4" ry="2.4" fill="#FB6A76"/>
      <ellipse cx="13" cy="8" rx="4" ry="2.4" fill="#FB6A76"/>
      <path d="M-7 8 Q 0 14 7 8" stroke="#401E2B" stroke-width="1.8" fill="none" stroke-linecap="round"/>
      <!-- raised arms -->
      <rect x="-36" y="-22" width="6" height="22" rx="3" fill="#BE5133"/>
      <rect x="30" y="-22" width="6" height="22" rx="3" fill="#BE5133"/>
    </g>
  </g>

  <g transform="translate(430, 120)">
    <g class="float" style="animation-delay:0.4s">
      <ellipse cx="0" cy="0" rx="28" ry="30" fill="#BE5133"/>
      <ellipse cx="0" cy="2" rx="22" ry="24" fill="#E59A63"/>
      <circle cx="-7" cy="-2" r="4.5" fill="#401D30"/>
      <circle cx="7" cy="-2" r="4.5" fill="#401D30"/>
      <circle cx="-8" cy="-4" r="1.2" fill="#FCF3D8"/>
      <circle cx="6" cy="-4" r="1.2" fill="#FCF3D8"/>
      <ellipse cx="-13" cy="8" rx="4" ry="2.4" fill="#FB6A76"/>
      <ellipse cx="13" cy="8" rx="4" ry="2.4" fill="#FB6A76"/>
      <path d="M-7 8 Q 0 14 7 8" stroke="#401E2B" stroke-width="1.8" fill="none" stroke-linecap="round"/>
      <rect x="-36" y="-22" width="6" height="22" rx="3" fill="#BE5133"/>
      <rect x="30" y="-22" width="6" height="22" rx="3" fill="#BE5133"/>
    </g>
  </g>

  <g transform="translate(520, 120)">
    <g class="float" style="animation-delay:0.8s">
      <ellipse cx="0" cy="0" rx="28" ry="30" fill="#BE5133"/>
      <ellipse cx="0" cy="2" rx="22" ry="24" fill="#E59A63"/>
      <circle cx="-7" cy="-2" r="4.5" fill="#401D30"/>
      <circle cx="7" cy="-2" r="4.5" fill="#401D30"/>
      <circle cx="-8" cy="-4" r="1.2" fill="#FCF3D8"/>
      <circle cx="6" cy="-4" r="1.2" fill="#FCF3D8"/>
      <ellipse cx="-13" cy="8" rx="4" ry="2.4" fill="#FB6A76"/>
      <ellipse cx="13" cy="8" rx="4" ry="2.4" fill="#FB6A76"/>
      <path d="M-7 8 Q 0 14 7 8" stroke="#401E2B" stroke-width="1.8" fill="none" stroke-linecap="round"/>
      <rect x="-36" y="-22" width="6" height="22" rx="3" fill="#BE5133"/>
      <rect x="30" y="-22" width="6" height="22" rx="3" fill="#BE5133"/>
    </g>
  </g>

  <!-- sparkles -->
  <g fill="#FFD94A">
    <polygon points="260,40 263,50 273,53 263,56 260,66 257,56 247,53 257,50"/>
    <polygon points="500,30 502,38 510,40 502,42 500,50 498,42 490,40 498,38"/>
    <polygon points="380,32 382,40 390,42 382,44 380,52 378,44 370,42 378,40"/>
  </g>
</svg>
