<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 48 48" role="img" aria-label="Incremental at any scale">
  <defs>
    <style>
      .pulse { animation: p 1.6s ease-in-out infinite; }
      @keyframes p { 0%,100% { opacity: 1 } 50% { opacity: 0.45 } }
    </style>
  </defs>
  <g stroke="#532638" stroke-opacity="0.3" stroke-width="1" fill="rgba(83,38,56,0.05)">
    <rect x="5" y="7" width="38" height="5" rx="1.5"/>
    <rect x="5" y="15" width="38" height="5" rx="1.5"/>
    <rect x="5" y="31" width="38" height="5" rx="1.5"/>
    <rect x="5" y="39" width="38" height="5" rx="1.5"/>
  </g>
  <rect class="pulse" x="5" y="23" width="38" height="5" rx="1.5"
        fill="rgba(190,81,51,0.32)" stroke="#BE5133" stroke-width="1.4"/>
  <text x="40" y="27.5" text-anchor="end" font-family="JetBrains Mono, ui-monospace, monospace" font-size="5" font-weight="700" fill="#BE5133" letter-spacing="0.05em">Δ +1</text>
  <circle cx="2.5" cy="25.5" r="1.6" fill="#27E62B"/>
</svg>
