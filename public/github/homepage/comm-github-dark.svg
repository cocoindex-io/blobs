<svg xmlns="http://www.w3.org/2000/svg" viewBox="-320 15 620 94" role="img" aria-label="Appreciate a star ❤️ — a cursor hovers over the Star button, clicks, the star fills, tiny stars burst out in celebration, and the count ticks from 6.9k to 7.0k.">
  <title>Star CocoIndex on GitHub</title>
  <desc>Animated GitHub-style "Star" button. A cursor arrows in, clicks, the outline star fills yellow, a celebratory confetti of small stars bursts outward in random directions and sizes, and the counter ticks from 6.9k to 7.0k.</desc>
  <defs>
    <style>
      /* 6-second cycle:
         0 – 18%   cursor enters from bottom-right
         18 – 30%  cursor hovers over the star
         30 – 34%  click: cursor dips, ripple fires, star fills
         34 – 44%  confetti bursts outward
         34 – 82%  starred state holds
         82 – 100% cursor exits, everything resets                   */

      .empty { opacity: 1;  animation: emptyStar 6s ease-in-out infinite; }
      .full  { opacity: 0;  animation: fullStar  6s ease-in-out infinite;
               transform-origin: 34px 75px; transform-box: fill-box; }
      @keyframes emptyStar {
        0%, 30%, 82%, 100% { opacity: 1 }
        34%, 80%           { opacity: 0 }
      }
      @keyframes fullStar {
        0%, 30%, 82%, 100% { opacity: 0; transform: scale(0.85); }
        34%                { opacity: 1; transform: scale(1.3); }
        40%, 80%           { opacity: 1; transform: scale(1); }
      }

      .label-star    { opacity: 1; animation: labelOff 6s ease-in-out infinite; }
      .label-starred { opacity: 0; animation: labelOn  6s ease-in-out infinite; }
      .count-69      { opacity: 1; animation: labelOff 6s ease-in-out infinite; }
      .count-70      { opacity: 0; animation: labelOn  6s ease-in-out infinite; }
      @keyframes labelOff { 0%, 30%, 82%, 100% { opacity: 1 } 34%, 80% { opacity: 0 } }
      @keyframes labelOn  { 0%, 30%, 82%, 100% { opacity: 0 } 34%, 80% { opacity: 1 } }

      .ripple {
        opacity: 0;
        animation: ripple 6s ease-out infinite;
        transform-origin: 34px 75px;
        transform-box: fill-box;
      }
      .ripple-2 { animation-delay: 0.1s; }
      .ripple-3 { animation-delay: 0.2s; }
      @keyframes ripple {
        0%, 30%, 50%, 100% { opacity: 0; transform: scale(0.4); }
        32%                { opacity: 0.85; transform: scale(0.5); }
        44%                { opacity: 0; transform: scale(3); }
      }

      /* === celebration burst — 10 tiny stars radiating from (34,45) === */
      [class^="bst"] {
        transform-box: fill-box;
        transform-origin: center;
        opacity: 0;
      }
      .bst1  { animation: bst1  6s ease-out infinite; }
      .bst2  { animation: bst2  6s ease-out infinite; }
      .bst3  { animation: bst3  6s ease-out infinite; }
      .bst4  { animation: bst4  6s ease-out infinite; }
      .bst5  { animation: bst5  6s ease-out infinite; }
      .bst6  { animation: bst6  6s ease-out infinite; }
      .bst7  { animation: bst7  6s ease-out infinite; }
      .bst8  { animation: bst8  6s ease-out infinite; }
      .bst9  { animation: bst9  6s ease-out infinite; }
      .bst10 { animation: bst10 6s ease-out infinite; }
      @keyframes bst1  { 0%,32%,50%,100% { opacity:0; transform: translate(0,0) scale(0) rotate(0);   } 36% { opacity:1; transform: translate(0,0) scale(0.8) rotate(-20deg); } 48% { opacity:0; transform: translate( 48px,-14px) scale(1.1) rotate(60deg); } }
      @keyframes bst2  { 0%,32%,50%,100% { opacity:0; transform: translate(0,0) scale(0);   } 36% { opacity:1; transform: translate(0,0) scale(1.0); } 48% { opacity:0; transform: translate( 40px,-36px) scale(1.4) rotate(120deg); } }
      @keyframes bst3  { 0%,32%,52%,100% { opacity:0; transform: translate(0,0) scale(0);   } 36% { opacity:1; transform: translate(0,0) scale(0.6); } 50% { opacity:0; transform: translate( 16px,-52px) scale(0.9) rotate(-60deg); } }
      @keyframes bst4  { 0%,32%,50%,100% { opacity:0; transform: translate(0,0) scale(0);   } 36% { opacity:1; transform: translate(0,0) scale(0.9); } 48% { opacity:0; transform: translate(-18px,-50px) scale(1.2) rotate(45deg); } }
      @keyframes bst5  { 0%,32%,52%,100% { opacity:0; transform: translate(0,0) scale(0);   } 36% { opacity:1; transform: translate(0,0) scale(0.7); } 50% { opacity:0; transform: translate(-44px,-30px) scale(1.0) rotate(-80deg); } }
      @keyframes bst6  { 0%,32%,50%,100% { opacity:0; transform: translate(0,0) scale(0);   } 36% { opacity:1; transform: translate(0,0) scale(1.0); } 48% { opacity:0; transform: translate(-50px, -6px) scale(1.3) rotate(90deg); } }
      @keyframes bst7  { 0%,32%,52%,100% { opacity:0; transform: translate(0,0) scale(0);   } 37% { opacity:1; transform: translate(0,0) scale(0.6); } 50% { opacity:0; transform: translate(-42px, 20px) scale(0.9) rotate(140deg); } }
      @keyframes bst8  { 0%,32%,50%,100% { opacity:0; transform: translate(0,0) scale(0);   } 37% { opacity:1; transform: translate(0,0) scale(0.8); } 48% { opacity:0; transform: translate(-12px, 36px) scale(1.1) rotate(-40deg); } }
      @keyframes bst9  { 0%,32%,52%,100% { opacity:0; transform: translate(0,0) scale(0);   } 37% { opacity:1; transform: translate(0,0) scale(1.0); } 50% { opacity:0; transform: translate( 24px, 34px) scale(1.3) rotate(70deg); } }
      @keyframes bst10 { 0%,32%,50%,100% { opacity:0; transform: translate(0,0) scale(0);   } 37% { opacity:1; transform: translate(0,0) scale(0.7); } 48% { opacity:0; transform: translate( 50px, 18px) scale(1.0) rotate(-100deg); } }

      /* cursor travel */
      .cursor { animation: cursorMove 6s ease-in-out infinite; }
      @keyframes cursorMove {
        0%   { transform: translate(220px, 114px) rotate(-20deg); }
        18%  { transform: translate(34px,  72px) rotate(0deg);   }
        28%  { transform: translate(34px,  72px) rotate(0deg);   }
        32%  { transform: translate(34px,  72px) rotate(0deg) scale(0.82); }
        36%  { transform: translate(34px,  72px) rotate(0deg) scale(1); }
        82%  { transform: translate(34px,  72px) rotate(0deg); }
        100% { transform: translate(220px, 114px) rotate(-20deg); }
      }
    </style>

    <!-- reusable small celebration star (centered at 0,0) -->
    <path id="tinystar" d="M 0 -6 L 1.8 -1.8 L 6 -1.7 L 2.6 1.1 L 3.7 5.3 L 0 3 L -3.7 5.3 L -2.6 1.1 L -6 -1.7 L -1.8 -1.8 Z"/>
    <style>
      .cute-heart { animation: heartbeat 1.6s ease-in-out infinite; transform-origin: 11px 11px; transform-box: fill-box; }
      @keyframes heartbeat {
        0%, 100% { transform: scale(1); }
        15%      { transform: scale(1.22); }
        30%      { transform: scale(1); }
        45%      { transform: scale(1.14); }
        60%      { transform: scale(1); }
      }
    </style>
  </defs>

  <!-- button shell -->
  <rect x="2" y="52" width="296" height="46" rx="10" fill="rgba(252,243,216,0.04)" stroke="rgba(252,243,216,0.35)" stroke-width="1.2"/>

  <!-- star icons (centred at 34, 45) -->
  <g>
    <path class="empty"
          d="M34 65 L37 72 L45 72.3 L39 77 L40.8 84.5 L34 80.5 L27.2 84.5 L29 77 L23 72.3 L31 72 Z"
          fill="none" stroke="#FFD94A" stroke-width="1.8" stroke-linejoin="round"/>
    <path class="full"
          d="M34 65 L37 72 L45 72.3 L39 77 L40.8 84.5 L34 80.5 L27.2 84.5 L29 77 L23 72.3 L31 72 Z"
          fill="#FFD94A" stroke="#FFD94A" stroke-width="1.8" stroke-linejoin="round"/>
    <!-- ripple rings -->
    <circle class="ripple"   cx="34" cy="75" r="10" fill="none" stroke="#FFD94A" stroke-width="1.6"/>
    <circle class="ripple ripple-2" cx="34" cy="75" r="10" fill="none" stroke="#FFD94A" stroke-width="1.6"/>
    <circle class="ripple ripple-3" cx="34" cy="75" r="10" fill="none" stroke="#FFD94A" stroke-width="1.6"/>
  </g>

  <!-- ===== celebration burst — 10 tiny stars, mixed yellow + peach ===== -->
  <g transform="translate(34,75)">
    <use class="bst1"  href="#tinystar" fill="#FFD94A"/>
    <use class="bst2"  href="#tinystar" fill="#F5B07F"/>
    <use class="bst3"  href="#tinystar" fill="#FFD94A"/>
    <use class="bst4"  href="#tinystar" fill="#FFE787"/>
    <use class="bst5"  href="#tinystar" fill="#F5B07F"/>
    <use class="bst6"  href="#tinystar" fill="#FFD94A"/>
    <use class="bst7"  href="#tinystar" fill="#FFE787"/>
    <use class="bst8"  href="#tinystar" fill="#FFD94A"/>
    <use class="bst9"  href="#tinystar" fill="#F5B07F"/>
    <use class="bst10" href="#tinystar" fill="#FFD94A"/>
  </g>

  <!-- divider -->
  <line x1="58" y1="62" x2="58" y2="88" stroke="rgba(252,243,216,0.2)"/>

  <!-- labels -->
  <g font-family="Inter, -apple-system, system-ui, sans-serif" font-size="16" font-weight="600" fill="#FCF3D8">
    <text class="label-star"    x="72" y="81">Star</text>
    <text class="label-starred" x="72" y="81">Starred</text>
  </g>

  <!-- count pill -->
  <g>
    <rect x="230" y="62" width="56" height="26" rx="6" fill="rgba(252,243,216,0.08)" stroke="rgba(252,243,216,0.22)"/>
    <text class="count-69" x="258" y="80" text-anchor="middle" font-family="JetBrains Mono, ui-monospace, monospace" font-size="13" font-weight="600" fill="#FCF3D8">6.9k</text>
    <text class="count-70" x="258" y="80" text-anchor="middle" font-family="JetBrains Mono, ui-monospace, monospace" font-size="13" font-weight="700" fill="#FFD94A">7.0k</text>
  </g>

  <!-- cursor (arrow) -->
  <g class="cursor">
    <path d="M0 0 L0 18 L5 14 L9 22 L12 20.5 L8 12.5 L14 12.5 Z"
          fill="#FCF3D8" stroke="#2A121B" stroke-width="1.2" stroke-linejoin="round"/>
  </g>

  <!-- cute plump heart first, gently beating -->
  <g transform="translate(-310, 64)">
    <g class="cute-heart">
      <path d="M11 19 C 3 13, -1 9, 1 5 C 3 1, 7 -1, 10 1.5 C 10.8 2.2, 11 3, 11 3.8 C 11 3, 11.2 2.2, 12 1.5 C 15 -1, 19 1, 21 5 C 23 9, 19 13, 11 19 Z"
            fill="#FB6A76" stroke="#2A121B" stroke-width="1.2" stroke-linejoin="round"/>
      <ellipse cx="6" cy="4.5" rx="2.5" ry="1.8" fill="#FFE0E4" opacity="0.9"/>
      <circle cx="15.5" cy="3.5" r="0.9" fill="#FFE0E4" opacity="0.75"/>
    </g>
  </g>

  <!-- Caption inline to the RIGHT of the heart, vertically centered with button -->
  <text x="-280" y="75" dominant-baseline="central"
        font-family="Inter, -apple-system, system-ui, sans-serif"
        font-size="14" font-weight="700" letter-spacing="-0.2"
        fill="#FCF3D8">Appreciate a star if you like it!</text>
</svg>
