<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 1400 600" role="img" aria-label="Python-native transformation: source connectors on the left flow into the incremental engine, then out to target stores on the right. Top lane shows a cache hit (skipped). Bottom lane shows a delta detected and re-embedded.">
  <defs>
    <marker id="hw-soft" viewBox="0 0 10 10" refX="9" refY="5" markerWidth="6" markerHeight="6" orient="auto">
      <path d="M0,0 L10,5 L0,10 z" fill="#FCF3D8" opacity="0.6"/>
    </marker>
    <marker id="hw-coral" viewBox="0 0 10 10" refX="9" refY="5" markerWidth="6" markerHeight="6" orient="auto">
      <path d="M0,0 L10,5 L0,10 z" fill="#FF6B5A"/>
    </marker>
    <marker id="hw-mint" viewBox="0 0 10 10" refX="9" refY="5" markerWidth="6" markerHeight="6" orient="auto">
      <path d="M0,0 L10,5 L0,10 z" fill="#3DEE7E"/>
    </marker>
    <style>
      .live { animation: liv 1.6s ease-in-out infinite; }
      @keyframes liv { 0%,100% { opacity: 1 } 50% { opacity: 0.45 } }
      .breath { animation: br 3.5s ease-in-out infinite; transform-origin: center; transform-box: fill-box; }
      @keyframes br { 0%,100% { transform: scale(1) } 50% { transform: scale(1.1) } }
    </style>
  </defs>

  <text x="700" y="44" text-anchor="middle"
        font-family="Inter, -apple-system, system-ui, sans-serif"
        font-size="28" font-weight="600" letter-spacing="-0.4" fill="#FCF3D8">
    Python-native <tspan fill="#F5B07F" font-style="italic">transformation</tspan>
  </text>
  <text x="700" y="74" text-anchor="middle"
        font-family="JetBrains Mono, ui-monospace, monospace"
        font-size="11" letter-spacing="0.22em" fill="rgba(252,243,216,0.6)">
    ANY SOURCE · @coco.fn · ANY TARGET
  </text>

