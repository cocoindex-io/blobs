        <text x="340" y="6" text-anchor="middle" font-family="JetBrains Mono, ui-monospace, monospace" font-size="12" fill="#3DEE7E" font-weight="700">embed ✓</text>
        <path d="M382,2 L 470,2" stroke="#3DEE7E" stroke-opacity="0.7" stroke-width="1.6" fill="none" marker-end="url(#hw-mint)"/>
