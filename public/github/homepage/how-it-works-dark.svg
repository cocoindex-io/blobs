        <text x="512" y="6" text-anchor="middle" font-family="JetBrains Mono, ui-monospace, monospace" font-size="11" fill="#FCF3D8">sink</text>
        <path d="M552,2 L 620,2" stroke="#3DEE7E" stroke-opacity="0.55" stroke-width="1.4" stroke-dasharray="3 4" fill="none" marker-end="url(#hw-mint)"/>
        <text x="624" y="6" font-family="JetBrains Mono, ui-monospace, monospace" font-size="11" fill="#3DEE7E">noop</text>
