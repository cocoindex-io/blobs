  <g>
    <rect x="320" y="100" width="760" height="460" rx="16" fill="rgba(245,176,127,0.05)" stroke="#FF6B5A" stroke-width="1.8"/>
    <text x="700" y="130" text-anchor="middle" font-family="JetBrains Mono, ui-monospace, monospace" font-size="11" letter-spacing="0.24em" fill="#FF6B5A" font-weight="700">INCREMENTAL ENGINE</text>
    <g transform="translate(340,118)">
