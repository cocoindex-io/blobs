    <!-- code snippet -->
    <g transform="translate(360,158)">
      <rect x="0" y="0" width="680" height="100" rx="10" fill="#1A0A12" stroke="rgba(252,243,216,0.18)"/>
      <text x="16" y="24" font-family="JetBrains Mono, ui-monospace, monospace" font-size="11" letter-spacing="0.18em" fill="rgba(252,243,216,0.65)">@coco.fn · YOUR TRANSFORMATION</text>
      <g font-family="JetBrains Mono, ui-monospace, monospace" font-size="14" fill="#FCF3D8">
        <text x="16" y="50"><tspan fill="#F5B07F">@coco.fn</tspan>(<tspan fill="#FF8FA3">memo</tspan>=<tspan fill="#3DEE7E">True</tspan>)</text>
        <text x="16" y="72"><tspan fill="#F5B07F">async def</tspan> <tspan fill="#FF8FA3">process</tspan>(file):</text>
        <text x="48" y="94">chunks = <tspan fill="#FF8FA3">split</tspan>(file); <tspan fill="#F5B07F">yield</tspan> <tspan fill="#FF8FA3">embed</tspan>(chunks)</text>
      </g>
    </g>

