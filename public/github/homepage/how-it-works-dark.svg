        <text x="340" y="6" text-anchor="middle" font-family="JetBrains Mono, ui-monospace, monospace" font-size="12" fill="#FCF3D8" font-weight="700">embed Δ</text>
        <path d="M382,2 L 470,2" stroke="#FF6B5A" stroke-width="1.8" fill="none" marker-end="url(#hw-coral)"/>
        <rect x="480" y="-16" width="64" height="36" rx="6" fill="#FF6B5A"/>
        <text x="512" y="6" text-anchor="middle" font-family="JetBrains Mono, ui-monospace, monospace" font-size="11" fill="#FCF3D8">sink</text>
        <path d="M552,2 L 620,2" stroke="#FF6B5A" stroke-width="1.6" stroke-dasharray="3 4" fill="none" marker-end="url(#hw-coral)"/>
        <text x="624" y="6" font-family="JetBrains Mono, ui-monospace, monospace" font-size="11" fill="#FF6B5A" font-weight="700">upsert</text>
      </g>
