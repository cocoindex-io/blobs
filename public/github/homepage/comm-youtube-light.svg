<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 260 100" role="img" aria-label="Subscribe to the CocoIndex YouTube channel">
  <title>YouTube (light theme)</title>
  <desc>Subscribe to the CocoIndex YouTube channel — tutorials, demos, architecture deep dives. Light-theme card: transparent YouTube-red tint with a muted red border, full-color play bezel, ink title.</desc>
  <rect x="0.5" y="0.5" width="259" height="99" rx="16" fill="rgba(255,0,51,0.06)" stroke="#FF0033" stroke-opacity="0.3" stroke-width="1"/>
