<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 600 320" role="img" aria-label="Multi-repo summarization — walk N git repos, extract structure, LLM-summarize per-repo + a rolled-up org summary, refresh on every push. Keywords: internal platform, developer experience, monorepo, SDK docs.">
  <title>Multi-repo summarization</title>
  <desc>Multiple git repos being summarized into a single rolled-up org summary; CocoIndex example; palette yellow.</desc>
  <defs>
    <linearGradient id="mr-t" x1="0" y1="0" x2="1" y2="0">
      <stop offset="0%" stop-color="#FFD94A"/>
      <stop offset="100%" stop-color="#F5B07F"/>
    </linearGradient>
    <marker id="mr-arr" viewBox="0 0 10 10" refX="9" refY="5" markerWidth="7" markerHeight="7" orient="auto">
      <path d="M0 0 L10 5 L0 10 z" fill="#FFD94A"/>
    </marker>
    <style>
      .flow { stroke-dasharray: 4 6; animation: mv 1.4s linear infinite; }
      @keyframes mv { from { stroke-dashoffset: 0 } to { stroke-dashoffset: -20 } }
    </style>
    <pattern id="ex-dots" width="12" height="12" patternUnits="userSpaceOnUse">
      <circle cx="1.5" cy="1.5" r="0.9" fill="#FCF3D8" fill-opacity="0.08"/>
    </pattern>
  </defs>
  <rect x="0.5" y="0.5" width="599" height="319" rx="16" fill="#0D1117" stroke="#30363D" stroke-width="1"/>
  <rect x="0.5" y="0.5" width="599" height="319" rx="16" fill="url(#ex-dots)"/>
  <text x="30" y="54" font-family="Inter, -apple-system, system-ui, sans-serif" font-size="24" font-weight="900" letter-spacing="-0.01em" fill="#FFD94A">Multi-repo summarization</text>
  <text x="30" y="80" font-family="Inter, -apple-system, system-ui, sans-serif" font-size="13" font-weight="500" fill="rgba(252,243,216,0.75)">N repos → per-repo + org summary — <tspan fill="#6DFFB0" font-style="italic">refresh on every push.</tspan></text>

  <!-- left: 4 git repos -->
  <g transform="translate(30, 116)" font-family="JetBrains Mono, ui-monospace, monospace">
    <g>
      <rect width="186" height="30" rx="7" fill="rgba(127,216,255,0.10)"/>
      <circle cx="18" cy="15" r="8" fill="#7FD8FF"/>
      <text x="18" y="15" text-anchor="middle" dominant-baseline="central" font-size="9" font-weight="900" fill="#0B2540">py</text>
      <text x="36" y="15" dominant-baseline="central" font-size="11" font-weight="700" fill="#7FD8FF">api-gateway</text>
      <text x="174" y="15" text-anchor="end" dominant-baseline="central" font-size="8" fill="rgba(252,243,216,0.45)">1.2k</text>
    </g>
    <g transform="translate(0, 36)">
      <rect width="186" height="30" rx="7" fill="rgba(255,138,155,0.10)"/>
      <circle cx="18" cy="15" r="8" fill="#FF8A9B"/>
      <text x="18" y="15" text-anchor="middle" dominant-baseline="central" font-size="9" font-weight="900" fill="#4A0E1A">rs</text>
      <text x="36" y="15" dominant-baseline="central" font-size="11" font-weight="700" fill="#FF8A9B">core-engine</text>
      <text x="174" y="15" text-anchor="end" dominant-baseline="central" font-size="8" fill="rgba(252,243,216,0.45)">2.4k</text>
    </g>
    <g transform="translate(0, 72)">
      <rect width="186" height="30" rx="7" fill="rgba(109,255,176,0.10)"/>
      <circle cx="18" cy="15" r="8" fill="#6DFFB0"/>
      <text x="18" y="15" text-anchor="middle" dominant-baseline="central" font-size="9" font-weight="900" fill="#0D3521">go</text>
      <text x="36" y="15" dominant-baseline="central" font-size="11" font-weight="700" fill="#6DFFB0">worker-svc</text>
      <text x="174" y="15" text-anchor="end" dominant-baseline="central" font-size="8" fill="rgba(252,243,216,0.45)">540</text>
    </g>
    <g transform="translate(0, 108)">
      <rect width="186" height="30" rx="7" fill="rgba(201,179,255,0.10)"/>
      <circle cx="18" cy="15" r="8" fill="#C9B3FF"/>
      <text x="18" y="15" text-anchor="middle" dominant-baseline="central" font-size="9" font-weight="900" fill="#2A1B4D">ts</text>
      <text x="36" y="15" dominant-baseline="central" font-size="11" font-weight="700" fill="#C9B3FF">web-ui</text>
      <text x="174" y="15" text-anchor="end" dominant-baseline="central" font-size="8" fill="rgba(252,243,216,0.45)">860</text>
    </g>
  </g>

  <!-- arrow LLM summarize -->
  <g>
    <path class="flow" d="M224 188 L 272 188" stroke="#FFD94A" stroke-width="1.8" fill="none" stroke-linecap="round" marker-end="url(#mr-arr)"/>
    <text x="248" y="176" text-anchor="middle" font-family="JetBrains Mono, ui-monospace, monospace" font-size="9" letter-spacing="0.14em" font-weight="800" fill="#FFD94A">LLM</text>
  </g>

  <!-- right: summary card -->
  <g transform="translate(280, 116)">
    <rect width="290" height="144" rx="12" fill="rgba(255,217,74,0.08)"/>
    <text x="14" y="22" font-family="JetBrains Mono, ui-monospace, monospace" font-size="9" letter-spacing="0.18em" font-weight="800" fill="#FFD94A">ORG · SUMMARY.md</text>
    <g font-family="Inter, -apple-system, system-ui, sans-serif" font-size="11" fill="#FCF3D8">
      <text x="14" y="46"><tspan fill="#FFD94A" font-weight="800">▸</tspan> 4 services · 5.0k LOC</text>
      <text x="14" y="66"><tspan fill="#FF8A9B" font-weight="800">▸</tspan> core-engine drives traffic</text>
      <text x="14" y="86"><tspan fill="#7FD8FF" font-weight="800">▸</tspan> api-gateway · REST + MCP</text>
      <text x="14" y="106"><tspan fill="#6DFFB0" font-weight="800">▸</tspan> 12 contributors this week</text>
      <text x="14" y="128" fill="rgba(252,243,216,0.55)" font-size="10" font-style="italic">updated 2 min ago · 3 pushes</text>
    </g>
  </g>

  <g transform="translate(30, 286)" font-family="JetBrains Mono, ui-monospace, monospace" font-size="9" letter-spacing="0.14em" font-weight="700">
    <rect width="62" height="20" rx="10" fill="rgba(127,216,255,0.14)"/>
    <text x="31" y="10" text-anchor="middle" dominant-baseline="central" fill="#7FD8FF">PYTHON</text>
    <g transform="translate(70, 0)"><rect width="52" height="20" rx="10" fill="rgba(255,138,155,0.14)"/><text x="26" y="10" text-anchor="middle" dominant-baseline="central" fill="#FF8A9B">GIT</text></g>
    <g transform="translate(130, 0)"><rect width="46" height="20" rx="10" fill="rgba(255,217,74,0.14)"/><text x="23" y="10" text-anchor="middle" dominant-baseline="central" fill="#FFD94A">LLM</text></g>
    <g transform="translate(184, 0)"><rect width="100" height="20" rx="10" fill="rgba(109,255,176,0.14)"/><text x="50" y="10" text-anchor="middle" dominant-baseline="central" fill="#6DFFB0">DEV PLATFORM</text></g>
    <text x="540" y="10" text-anchor="end" dominant-baseline="central" font-weight="800" fill="rgba(252,243,216,0.75)">GITHUB →</text>
  </g>
</svg>
